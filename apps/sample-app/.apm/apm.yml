name: sample-app
version: 1.0.0
description: "Azure Web App + microservices — sample template for agentic pipeline"
tokenBudget: 6000

agents:
  schema-dev:
    instructions: [always, backend/schema-sync.md, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    mcp: [roam-code]
    skills: [test-schema-validation]
    toolLimits: { soft: 60, hard: 80 }
  infra-architect:
    instructions: [always, infra, backend/schema-sync.md, tooling/roam-tool-rules.md]
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 70, hard: 100 }
  infra-handoff:
    instructions: [always, tooling/roam-tool-rules.md]
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }
  push-infra:
    instructions: [always]
    mcp: []
    skills: []
    toolLimits: { soft: 60, hard: 80 }
  poll-infra-plan:
    instructions: [always]
    mcp: []
    skills: []
    toolLimits: { soft: 60, hard: 80 }
  create-draft-pr:
    instructions: [always]
    mcp: []
    skills: []
    toolLimits: { soft: 60, hard: 80 }
  await-infra-approval:
    instructions: [always]
    mcp: []
    skills: []
    toolLimits: { soft: 60, hard: 80 }
  backend-dev:
    instructions: [always, backend, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    mcp: [roam-code]
    skills: [test-backend-unit]
    toolLimits: { soft: 80, hard: 110 }
  frontend-dev:
    instructions: [always, frontend, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    mcp: [roam-code]
    skills: [test-frontend-unit, build-frontend]
    toolLimits: { soft: 80, hard: 110 }
  backend-unit-test:
    instructions: [always, tooling/roam-test-intelligence.md]
    mcp: [roam-code]
    skills: [test-backend-unit]
    toolLimits: { soft: 60, hard: 90 }
  frontend-unit-test:
    instructions: [always, frontend/known-framework-issues.md, tooling/roam-test-intelligence.md]
    mcp: [roam-code]
    skills: [test-frontend-unit]
    toolLimits: { soft: 60, hard: 90 }
  push-app:
    instructions: [always]
    mcp: []
    skills: []
    toolLimits: { soft: 60, hard: 80 }
  poll-app-ci:
    instructions: [always]
    mcp: []
    skills: []
    toolLimits: { soft: 60, hard: 80 }
  integration-test:
    instructions: [always, backend/integration-testing.md, backend/integration-auth.md, tooling/cloud-telemetry.md]
    mcp: []
    skills: [test-integration]
    toolLimits: { soft: 70, hard: 120 }
  live-ui:
    instructions: [always, frontend/e2e-testing-mandate.md, frontend/known-framework-issues.md, tooling/roam-tool-rules.md, tooling/roam-test-intelligence.md, tooling/cloud-telemetry.md]
    mcp: [roam-code, playwright]
    skills: []
    toolLimits: { soft: 100, hard: 130 }
  code-cleanup:
    instructions: [always, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }
  docs-archived:
    instructions: [always, tooling/roam-tool-rules.md]
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }
  publish-pr:
    instructions: [always, tooling/roam-tool-rules.md]
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }

config:
  defaultToolLimits: { soft: 60, hard: 80 }
  hooks:
    validateInfra: "bash .apm/hooks/validate-infra.sh"
    validateApp: "bash .apm/hooks/validate-app.sh"
    preflightAuth: "bash .apm/hooks/preflight-auth.sh"
  environment:
    FRONTEND_URL: "${SWA_URL}"
    BACKEND_URL: "${FUNCTION_APP_URL}"
    APIM_URL: "${APIM_URL}"
    FUNC_APP_NAME: "${AZURE_FUNCTION_APP_NAME}"
    RESOURCE_GROUP: "${AZURE_RESOURCE_GROUP}"
    APP_INSIGHTS_NAME: "${AZURE_APP_INSIGHTS_NAME}"
  directories:
    backend: backend
    frontend: frontend
    infra: infra
    e2e: e2e
  testCommands:
    backendUnit: "cd {appRoot}/backend && npx jest --verbose"       # TODO: Adapt to your test runner
    frontendUnit: "cd {appRoot}/frontend && npx jest --verbose"     # TODO: Adapt to your test runner
    integration: "cd {appRoot}/backend && npm run test:integration"  # TODO: Adapt to your integration tests
  ciJobs:
    backend: "Backend"
    frontend: "Frontend"
    schemas: "Schemas"
    infra: "Terraform"
  ciWorkflows:
    app: "Deploy Backend,Deploy Frontend"
    infra: "Deploy Infrastructure,Schema Drift Check"
    filePatterns: ["deploy-backend.yml", "deploy-frontend.yml", "deploy-infra.yml", "ci-integration.yml"]
    infraPlanFile: "deploy-infra.yml"

