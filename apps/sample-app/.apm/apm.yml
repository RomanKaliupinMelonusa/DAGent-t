name: sample-app
version: 1.0.0
description: "Azure Web App + microservices — sample template for agentic pipeline"
tokenBudget: 8000

agents:
  schema-dev:
    instructions: [always, backend/schema-sync.md, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: schema-dev.agent.md
    mcp: [roam-code]
    skills: [test-schema-validation]
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^packages/schemas/", "^backend/src/.*[Ss]chema"]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  infra-architect:
    instructions: [always, infra, backend/schema-sync.md, tooling/roam-tool-rules.md]
    promptFile: infra-architect.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 70, hard: 100 }
    security:
      allowedWritePaths: ["^infra/", "^\\.github/workflows/"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  infra-handoff:
    instructions: [always, tooling/roam-tool-rules.md]
    promptFile: infra-handoff.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^infra/", "^\\.github/"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent]
      mcp:
        roam-code: "*"
  create-draft-pr:
    instructions: [always]
    promptFile: create-pr.agent.md
    mcp: []
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, bash, write_bash, shell, grep_search, list_dir, report_intent]
  backend-dev:
    instructions: [always, backend, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: backend-dev.agent.md
    mcp: [roam-code]
    skills: [test-backend-unit]
    toolLimits: { soft: 80, hard: 110, fileReadLineLimit: 750, shellOutputLimit: 128000 }
    security:
      allowedWritePaths: ["^backend/", "^packages/schemas/"]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  frontend-dev:
    instructions: [always, frontend, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: frontend-dev.agent.md
    mcp: [roam-code]
    skills: [test-frontend-unit, build-frontend]
    toolLimits: { soft: 80, hard: 110, fileReadLineLimit: 750, shellOutputLimit: 128000 }
    security:
      allowedWritePaths: ["^frontend/", "^packages/schemas/"]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  backend-unit-test:
    instructions: [always, tooling/roam-test-intelligence.md]
    promptFile: backend-unit-test.agent.md
    mcp: [roam-code]
    skills: [test-backend-unit]
    toolLimits: { soft: 60, hard: 90 }
    security:
      allowedWritePaths: ["(^|/)__tests__/", "\\.test\\.", "\\.spec\\."]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  frontend-unit-test:
    instructions: [always, frontend/known-framework-issues.md, tooling/roam-test-intelligence.md]
    promptFile: frontend-unit-test.agent.md
    mcp: [roam-code]
    skills: [test-frontend-unit]
    toolLimits: { soft: 60, hard: 90 }
    security:
      allowedWritePaths: ["(^|/)__tests__/", "\\.test\\.", "\\.spec\\."]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  integration-test:
    instructions: [always, backend/integration-testing.md, backend/integration-auth.md, tooling/cloud-telemetry.md]
    promptFile: backend-unit-test.agent.md
    mcp: []
    skills: [test-integration]
    toolLimits: { soft: 70, hard: 120, shellTimeoutMs: 900000, shellOutputLimit: 128000 }
    security:
      allowedWritePaths: ["(^|/)e2e/", "(^|/)__tests__/", "\\.test\\."]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
  live-ui:
    instructions: [always, frontend/e2e-testing-mandate.md, frontend/known-framework-issues.md, tooling/roam-tool-rules.md, tooling/roam-test-intelligence.md, tooling/cloud-telemetry.md]
    promptFile: frontend-unit-test.agent.md
    mcp: [roam-code, playwright]
    skills: []
    toolLimits: { soft: 100, hard: 130, fileReadLineLimit: 750, shellTimeoutMs: 900000, shellOutputLimit: 128000 }
    security:
      allowedWritePaths: ["(^|/)e2e/", "\\.spec\\."]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
        playwright: "*"
  code-cleanup:
    instructions: [always, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: code-cleanup.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  doc-architect:
    instructions: [always, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: doc-architect.agent.md
    mcp: [roam-code, mermaid]
    skills: []
    toolLimits: { soft: 40, hard: 55, fileReadLineLimit: 300 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
        mermaid: "*"
  docs-archived:
    instructions: [always, tooling/roam-tool-rules.md]
    promptFile: docs-archived.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"

# ═══════════════════════════════════════════════════════════════════════
# Node Pool — Reusable work units (agent, script, triage, approval)
# Nodes define WHAT to execute; workflows define HOW to connect them.
# ═══════════════════════════════════════════════════════════════════════
nodes:
  # ── Scaffolding ────────────────────────────────────────────────────
  # Pipeline-specific side-effects the kernel must not own. `create-branch`
  # materializes the feature branch; `stage-spec` copies the user-supplied
  # spec (SPEC_FILE) into `_kickoff/spec.md` so downstream agents consume it
  # via their declared `consumes_kickoff: [spec]`.
  create-branch:
    type: script
    category: scaffold
    timeout_minutes: 2
    script_type: local-exec
    command: "bash ${REPO_ROOT}/tools/autonomous-factory/agent-branch.sh create-feature ${featureSlug}"

  stage-spec:
    type: script
    category: scaffold
    timeout_minutes: 2
    script_type: local-exec
    command: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/stage-spec.sh"

  schema-dev:
    type: agent
    category: dev
    agent: "@schema-dev"
    timeout_minutes: 20
    commit_scope: backend
    diff_attribution_dirs: [packages]
    circuit_breaker:
      allows_revert_bypass: true
      allows_timeout_salvage: true

  infra-architect:
    type: agent
    category: dev
    agent: "@infra-architect"
    timeout_minutes: 20
    commit_scope: infra
    diff_attribution_dirs: [infra]
    injects_triage_rejection: true
    circuit_breaker:
      allows_revert_bypass: true
      allows_timeout_salvage: true

  push-code:
    type: script
    category: deploy
    timeout_minutes: 15
    script_type: local-exec
    command: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/push-and-sentinel.sh"
    captures_head_sha: true
    circuit_breaker:
      halt_on_identical: true

  create-draft-pr:
    type: agent
    category: deploy
    agent: "@create-draft-pr"
    timeout_minutes: 15
    commit_scope: pipeline

  poll-ci:
    type: script
    category: deploy
    timeout_minutes: 15
    script_type: poll
    captures_head_sha: true
    circuit_breaker:
      halt_on_identical: true

  await-approval:
    type: approval
    category: deploy
    timeout_minutes: 15
    commit_scope: pipeline
    # Phase 4 approval SLA — fall back to config.policy defaults if omitted.
    timeout_hours: 24
    on_timeout: halt

  infra-handoff:
    type: agent
    category: dev
    agent: "@infra-handoff"
    timeout_minutes: 20
    commit_scope: pipeline
    post: "bash .apm/hooks/validate-infra.sh"
    circuit_breaker:
      allows_revert_bypass: true
      allows_timeout_salvage: true

  backend-dev:
    type: agent
    category: dev
    agent: "@backend-dev"
    timeout_minutes: 20
    commit_scope: backend
    diff_attribution_dirs: [backend, packages, infra, .github/]
    circuit_breaker:
      allows_revert_bypass: true
      allows_timeout_salvage: true

  frontend-dev:
    type: agent
    category: dev
    agent: "@frontend-dev"
    timeout_minutes: 20
    commit_scope: frontend
    diff_attribution_dirs: [frontend, packages, e2e, .github/]
    circuit_breaker:
      allows_revert_bypass: true
      allows_timeout_salvage: true

  backend-unit-test:
    type: agent
    category: test
    agent: "@backend-unit-test"
    timeout_minutes: 10
    auto_skip_if_no_changes_in: [backend, infra, schemas, packages]
    commit_scope: backend
    diff_attribution_dirs: [backend, packages, infra, .github/]

  frontend-unit-test:
    type: agent
    category: test
    agent: "@frontend-unit-test"
    timeout_minutes: 10
    auto_skip_if_no_changes_in: [frontend, e2e]
    commit_scope: frontend
    diff_attribution_dirs: [frontend, packages, e2e, .github/]

  push-app:
    type: script
    category: deploy
    timeout_minutes: 15
    script_type: local-exec
    command: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/push-and-sentinel.sh"
    post: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/write-deploy-sentinels.sh"
    captures_head_sha: true
    circuit_breaker:
      halt_on_identical: true

  poll-app-ci:
    type: script
    category: deploy
    timeout_minutes: 15
    script_type: poll
    ci_workflow_key: app
    post: "bash .apm/hooks/validate-app.sh"
    captures_head_sha: true
    circuit_breaker:
      halt_on_identical: true

  integration-test:
    type: agent
    category: test
    agent: "@integration-test"
    timeout_minutes: 20
    requires_data_plane_ready: true
    auto_skip_if_no_changes_in: [backend, infra, schemas, packages]
    template_flags: ["isPostDeploy", "isIntegrationTest"]
    commit_scope: pipeline
    diff_attribution_dirs: [backend, packages, infra, .github/]

  live-ui:
    type: agent
    category: test
    agent: "@live-ui"
    timeout_minutes: 20
    requires_data_plane_ready: true
    auto_skip_if_no_changes_in: [frontend, infra, e2e]
    template_flags: ["isPostDeploy", "isLiveUi"]
    force_run_if_changed: ["infra"]
    commit_scope: pipeline
    diff_attribution_dirs: [frontend, packages, e2e, .github/]

  code-cleanup:
    type: agent
    category: finalize
    agent: "@code-cleanup"
    timeout_minutes: 20
    auto_skip_if_no_deletions: true
    commit_scope: pipeline

  docs-archived:
    type: agent
    category: finalize
    agent: "@docs-archived"
    timeout_minutes: 20
    commit_scope: docs
    generates_change_manifest: true
    salvage_survivor: true

  doc-architect:
    type: agent
    category: finalize
    agent: "@doc-architect"
    timeout_minutes: 20
    commit_scope: pipeline

  publish-pr:
    type: script
    category: finalize
    timeout_minutes: 15
    script_type: local-exec
    command: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/publish-pr.sh"
    signals_create_pr: true
    salvage_survivor: true
    circuit_breaker:
      halt_on_identical: true

  triage-node:
    type: triage
    category: finalize
    timeout_minutes: 5
    node_kind: control-flow

  # Hidden diagnostic node — Phase 3 example of `triggers: [route]`.
  # Invisible to the scheduler; only runs when triage `route_to` targets it
  # (e.g. the "diagnostic" fault domain). No dependents — purely routed.
  deep-debug:
    type: agent
    category: test
    agent: "@backend-dev"
    timeout_minutes: 10
    node_kind: diagnostic

config:
  defaultToolLimits: { soft: 60, hard: 80, fileReadLineLimit: 500, shellOutputLimit: 64000, shellTimeoutMs: 600000 }
  # Phase 4 operational hardening — stops stuck pipelines before they burn hours.
  policy:
    max_iterations: 500
    max_idle_minutes: 45           # no batch progress for 45 min → self-terminate
    max_total_failures: 15         # pipeline-wide halt budget
    approval_default_timeout_hours: 24
    approval_default_on_timeout: halt
  hooks:
    resolveEnvironment: "bash .apm/hooks/resolve-env.sh"
    validateInfra: "bash .apm/hooks/validate-infra.sh"
    validateApp: "bash .apm/hooks/validate-app.sh"
    preflightAuth: "bash .apm/hooks/preflight-auth.sh"
  environment:
    FRONTEND_URL: "${SWA_URL}"
    BACKEND_URL: "${FUNCTION_APP_URL}"
    APIM_URL: "${APIM_URL}"
    FUNC_APP_NAME: "${AZURE_FUNCTION_APP_NAME}"
    RESOURCE_GROUP: "${AZURE_RESOURCE_GROUP}"
    APP_INSIGHTS_NAME: "${AZURE_APP_INSIGHTS_NAME}"
  directories:
    backend: backend
    frontend: frontend
    infra: infra
    e2e: e2e
  testCommands:
    backendUnit: "cd {appRoot}/backend && npx jest --verbose"       # TODO: Adapt to your test runner
    frontendUnit: "cd {appRoot}/frontend && npx jest --verbose"     # TODO: Adapt to your test runner
    integration: "cd {appRoot}/backend && npm run test:integration"  # TODO: Adapt to your integration tests
  ciJobs:
    backend: "Backend"
    frontend: "Frontend"
    schemas: "Schemas"
    infra: "Terraform"
  ciWorkflows:
    app: "Deploy Backend,Deploy Frontend"
    infra: "Deploy Infrastructure,Schema Drift Check"
    filePatterns: ["deploy-backend.yml", "deploy-frontend.yml", "deploy-infra.yml", "ci-integration.yml"]
    infraPlanFile: "deploy-infra.yml"
    pr_comment_template: "> Comment `/dagent approve-infra` to apply this plan."

