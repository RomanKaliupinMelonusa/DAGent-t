# workflows.yml — Declarative DAG for the agentic pipeline.
#
# Structure:
#   <workflow-name>: Named workflow DAGs. Each is self-contained.
#
# Node definitions live in apm.yml → nodes: (the pool).
# Compiler merges pool defaults → workflow node (workflow fields win).
# Graph-only fields (depends_on, on_failure, phase, poll_target, triage_profile)
# are NEVER inherited from the pool.

# ═══════════════════════════════════════════════════════════════════════
# Workflow: full-stack
# ═══════════════════════════════════════════════════════════════════════
full-stack:
  description: "Full-stack pipeline: infra → backend + frontend → test → deploy → finalize"
  phases:
    - infra
    - approval
    - pre-deploy
    - deploy
    - post-deploy
    - finalize
    - triage

  # Workflow-level failure routing defaults — inherited by nodes with on_failure.
  # Per-node routes override these. Nodes without on_failure are unaffected.
  default_on_failure:
    triage: triage-full-stack
    routes:
      schemas: schema-dev
      cicd: push-app
      deployment-stale: push-app
      test-code: "$SELF"
      environment: "$SELF"
      blocked: null

  nodes:
    # ── Wave 1: Infrastructure ─────────────────────────────────────────
    schema-dev:
      phase: infra
      depends_on: []

    infra-architect:
      phase: infra
      depends_on: [schema-dev]

    push-infra:
      _node: push-code
      phase: infra
      depends_on: [infra-architect]

    create-draft-pr:
      phase: infra
      depends_on: [push-infra]

    poll-infra-plan:
      _node: poll-ci
      phase: infra
      depends_on: [create-draft-pr]
      post_ci_artifact_to_pr: "plan-output"
      poll_target: push-infra
      ci_workflow_key: infra

    # ── Approval Gate ──────────────────────────────────────────────────
    await-infra-approval:
      _node: await-approval
      phase: approval
      depends_on: [poll-infra-plan]

    infra-handoff:
      phase: approval
      depends_on: [await-infra-approval]

    # ── Wave 2: Application ────────────────────────────────────────────
    backend-dev:
      phase: pre-deploy
      depends_on: [schema-dev, infra-handoff]

    frontend-dev:
      phase: pre-deploy
      depends_on: [schema-dev, infra-handoff]

    backend-unit-test:
      phase: pre-deploy
      depends_on: [backend-dev]
      on_failure:
        routes: { backend: backend-dev }

    frontend-unit-test:
      phase: pre-deploy
      depends_on: [frontend-dev]
      on_failure:
        routes: { frontend: frontend-dev }

    push-app:
      phase: deploy
      depends_on: [backend-unit-test, frontend-unit-test]

    poll-app-ci:
      phase: deploy
      depends_on: [push-app]
      poll_target: push-app

    # ── Post-Deploy Validation ─────────────────────────────────────────
    integration-test:
      phase: post-deploy
      depends_on: [poll-app-ci]
      on_failure:
        routes:
          backend: backend-dev
          both: schema-dev
          "backend+infra": infra-architect
          infra: infra-architect

    live-ui:
      phase: post-deploy
      depends_on: [poll-app-ci, integration-test]
      on_failure:
        routes:
          frontend: frontend-dev
          both: schema-dev
          "frontend+infra": infra-architect
          infra: infra-architect

    # ── Finalize ───────────────────────────────────────────────────────
    code-cleanup:
      phase: finalize
      depends_on: [integration-test, live-ui]

    docs-archived:
      phase: finalize
      depends_on: [code-cleanup]

    doc-architect:
      phase: finalize
      depends_on: [code-cleanup, docs-archived]

    publish-pr:
      phase: finalize
      depends_on: [doc-architect]

    # ── Triage ─────────────────────────────────────────────────────────
    triage-full-stack:
      _node: triage-node
      phase: triage
      depends_on: []
      triage_profile: full-stack

  unfixable_signals:
    - "authorization_requestdenied"
    - "aadsts700016"
    - "aadsts7000215"
    - "application.readwrite"
    - "insufficient privileges"
    - "does not have authorization"
    - "subscription not found"
    - "resource group not found"
    - "cannot apply incomplete plan"
    - "error acquiring the state lock"
    - "resource already exists"
    - "state blob is already locked"

  triage:
    full-stack:
      packs: [azure-functions-common, deployment-lifecycle, cicd-root-cause]
      llm_fallback: true
      max_reroutes: 5
      routing:
        backend:
          description: "Application logic errors, 500s, import failures, API bugs"
        frontend:
          description: "UI rendering, selectors, Playwright failures, CSS/HTML issues"
        both:
          description: "Error clearly spans backend and frontend"
        schemas:
          description: "Schema/contract issues"
        "frontend+infra":
          description: "Frontend issue requiring infra fix"
        "backend+infra":
          description: "Backend issue requiring infra fix"
        cicd:
          description: "GitHub Actions workflow file errors, deploy pipeline config"
        deployment-stale:
          description: "Stale deployment requiring re-push"
        infra:
          description: "Missing cloud resources, CORS, auth config, Terraform errors, env vars"
        test-code:
          description: "The test itself is wrong (bad locator, race condition, contradicts spec)"
        environment:
          description: "Transient auth/credential glitch, not a code bug"
          retries: 2
        blocked:
          description: "Unfixable without human intervention (permissions, subscriptions)"

# ═══════════════════════════════════════════════════════════════════════
# Workflow: backend
# ═══════════════════════════════════════════════════════════════════════
backend:
  description: "Backend-only pipeline: schema → backend → test → deploy → finalize"
  phases:
    - infra
    - approval
    - pre-deploy
    - deploy
    - post-deploy
    - finalize
    - triage

  # Workflow-level failure routing defaults
  default_on_failure:
    triage: triage-backend
    routes:
      schemas: schema-dev
      cicd: push-app
      deployment-stale: push-app
      test-code: "$SELF"
      environment: "$SELF"
      blocked: null

  nodes:
    schema-dev:
      phase: infra
      depends_on: []

    infra-architect:
      phase: infra
      depends_on: [schema-dev]

    push-infra:
      _node: push-code
      phase: infra
      depends_on: [infra-architect]

    create-draft-pr:
      phase: infra
      depends_on: [push-infra]

    poll-infra-plan:
      _node: poll-ci
      phase: infra
      depends_on: [create-draft-pr]
      post_ci_artifact_to_pr: "plan-output"
      poll_target: push-infra
      ci_workflow_key: infra

    await-infra-approval:
      _node: await-approval
      phase: approval
      depends_on: [poll-infra-plan]

    infra-handoff:
      phase: approval
      depends_on: [await-infra-approval]

    backend-dev:
      phase: pre-deploy
      depends_on: [schema-dev, infra-handoff]

    backend-unit-test:
      phase: pre-deploy
      depends_on: [backend-dev]
      on_failure:
        routes: { backend: backend-dev, infra: infra-architect }

    push-app:
      phase: deploy
      depends_on: [backend-unit-test]

    poll-app-ci:
      phase: deploy
      depends_on: [push-app]
      poll_target: push-app

    integration-test:
      phase: post-deploy
      depends_on: [poll-app-ci]
      on_failure:
        routes:
          backend: backend-dev
          "backend+infra": infra-architect
          infra: infra-architect

    code-cleanup:
      phase: finalize
      depends_on: [integration-test]

    docs-archived:
      phase: finalize
      depends_on: [code-cleanup]

    doc-architect:
      phase: finalize
      depends_on: [code-cleanup, docs-archived]

    publish-pr:
      phase: finalize
      depends_on: [doc-architect]

    triage-backend:
      _node: triage-node
      phase: triage
      depends_on: []
      triage_profile: backend

  unfixable_signals:
    - "authorization_requestdenied"
    - "aadsts700016"
    - "aadsts7000215"
    - "insufficient privileges"
    - "does not have authorization"
    - "subscription not found"
    - "resource group not found"
    - "error acquiring the state lock"
    - "resource already exists"
    - "state blob is already locked"

  triage:
    backend:
      packs: [azure-functions-common, deployment-lifecycle, cicd-root-cause]
      llm_fallback: true
      max_reroutes: 5
      routing:
        backend:
          description: "Application logic errors, 500s, import failures, API bugs"
        schemas:
          description: "Schema/contract issues"
        "backend+infra":
          description: "Backend issue requiring infra fix"
        cicd:
          description: "GitHub Actions workflow file errors, deploy pipeline config"
        deployment-stale:
          description: "Stale deployment requiring re-push"
        infra:
          description: "Missing cloud resources, CORS, auth config, Terraform errors"
        test-code:
          description: "The test itself is wrong"
        environment:
          description: "Transient auth/credential glitch"
          retries: 2
        blocked:
          description: "Unfixable without human intervention"
