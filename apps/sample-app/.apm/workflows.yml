# workflows.yml — Declarative DAG for the agentic pipeline.
#
# This file replaces the hardcoded ALL_ITEMS, ITEM_DEPENDENCIES, and
# NA_ITEMS_BY_TYPE arrays in pipeline-state.mjs. The orchestrator reads
# this via the APM compiler (context.json) and bootstraps the state machine
# dynamically at pipeline init time.
#
# Workflow types: Backend, Frontend, Full-Stack, Infra, App-Only, Backend-Only

default:
  phases:
    - infra
    - approval
    - pre-deploy
    - deploy
    - post-deploy
    - finalize

  nodes:
    # ── Wave 1: Infrastructure ─────────────────────────────────────────
    schema-dev:
      type: agent
      category: dev
      agent: "@schema-dev"
      phase: infra
      timeout_minutes: 20
      depends_on: []
      run_if: [Backend, Full-Stack, Infra, App-Only, Backend-Only]
      commit_scope: backend
      diff_attribution_dirs: [packages]

    infra-architect:
      type: agent
      category: dev
      agent: "@infra-architect"
      phase: infra
      timeout_minutes: 20
      depends_on: [schema-dev]
      run_if: [Backend, Frontend, Full-Stack, Infra]
      commit_scope: infra
      diff_attribution_dirs: [infra]
      injects_infra_rollback: true

    push-infra:
      type: script
      category: deploy
      phase: infra
      timeout_minutes: 15
      depends_on: [infra-architect]
      run_if: [Backend, Frontend, Full-Stack, Infra]
      script_type: local-exec
      command: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/push-and-sentinel.sh"

    create-draft-pr:
      type: agent
      category: deploy
      agent: "@pr-creator"
      phase: infra
      timeout_minutes: 15
      depends_on: [push-infra]
      commit_scope: pipeline

    poll-infra-plan:
      type: script
      category: deploy
      phase: infra
      timeout_minutes: 15
      depends_on: [create-draft-pr]
      run_if: [Backend, Frontend, Full-Stack, Infra]
      post_ci_artifact_to_pr: "plan-output"
      script_type: poll
      poll_target: push-infra
      ci_workflow_key: infra

    # ── Approval Gate ──────────────────────────────────────────────────
    await-infra-approval:
      type: approval
      category: deploy
      phase: approval
      timeout_minutes: 15
      depends_on: [poll-infra-plan]
      run_if: [Backend, Frontend, Full-Stack, Infra]
      commit_scope: pipeline

    infra-handoff:
      type: agent
      category: dev
      agent: "@infra-handoff"
      phase: approval
      timeout_minutes: 20
      depends_on: [await-infra-approval]
      run_if: [Backend, Frontend, Full-Stack, Infra]
      commit_scope: pipeline
      post: "bash .apm/hooks/validate-infra.sh"

    # ── Wave 2: Application ────────────────────────────────────────────
    backend-dev:
      type: agent
      category: dev
      agent: "@backend-dev"
      phase: pre-deploy
      timeout_minutes: 20
      depends_on: [schema-dev, infra-handoff]
      run_if: [Backend, Full-Stack, App-Only, Backend-Only]
      commit_scope: backend
      diff_attribution_dirs: [backend, packages, infra, .github/]

    frontend-dev:
      type: agent
      category: dev
      agent: "@frontend-dev"
      phase: pre-deploy
      timeout_minutes: 20
      depends_on: [schema-dev, infra-handoff]
      run_if: [Frontend, Full-Stack, App-Only]
      commit_scope: frontend
      diff_attribution_dirs: [frontend, packages, e2e, .github/]

    backend-unit-test:
      type: agent
      category: test
      agent: "@backend-test"
      phase: pre-deploy
      timeout_minutes: 10
      depends_on: [backend-dev]
      run_if: [Backend, Full-Stack, App-Only, Backend-Only]
      auto_skip_if_no_changes_in: [backend, infra, schemas, packages]
      triage_json_gated: true
      commit_scope: backend
      diff_attribution_dirs: [backend, packages, infra, .github/]

    frontend-unit-test:
      type: agent
      category: test
      agent: "@frontend-ui-test"
      phase: pre-deploy
      timeout_minutes: 10
      depends_on: [frontend-dev]
      run_if: [Frontend, Full-Stack, App-Only]
      auto_skip_if_no_changes_in: [frontend, e2e]
      triage_json_gated: true
      commit_scope: frontend
      diff_attribution_dirs: [frontend, packages, e2e, .github/]

    push-app:
      type: script
      category: deploy
      phase: deploy
      timeout_minutes: 15
      depends_on: [backend-unit-test, frontend-unit-test]
      run_if: [Backend, Frontend, Full-Stack, App-Only, Backend-Only]
      script_type: local-exec
      command: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/push-and-sentinel.sh"
      post: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/write-deploy-sentinels.sh"

    poll-app-ci:
      type: script
      category: deploy
      phase: deploy
      timeout_minutes: 15
      depends_on: [push-app]
      run_if: [Backend, Frontend, Full-Stack, App-Only, Backend-Only]
      script_type: poll
      poll_target: push-app
      ci_workflow_key: app
      post: "bash .apm/hooks/validate-app.sh"

    # ── Post-Deploy Validation ─────────────────────────────────────────
    integration-test:
      type: agent
      category: test
      agent: "@backend-test"
      phase: post-deploy
      timeout_minutes: 20
      depends_on: [poll-app-ci]
      requires_data_plane_ready: true
      run_if: [Backend, Full-Stack, App-Only, Backend-Only]
      auto_skip_if_no_changes_in: [backend, infra, schemas, packages]
      triage_json_gated: true
      template_flags: ["isPostDeploy", "isIntegrationTest"]
      commit_scope: pipeline
      diff_attribution_dirs: [backend, packages, infra, .github/]

    live-ui:
      type: agent
      category: test
      agent: "@frontend-ui-test"
      phase: post-deploy
      timeout_minutes: 20
      depends_on: [poll-app-ci, integration-test]
      requires_data_plane_ready: true
      run_if: [Frontend, Full-Stack, App-Only]
      auto_skip_if_no_changes_in: [frontend, infra, e2e]
      triage_json_gated: true
      template_flags: ["isPostDeploy", "isLiveUi"]
      force_run_if_changed: ["infra"]
      commit_scope: pipeline
      diff_attribution_dirs: [frontend, packages, e2e, .github/]

    # ── Finalize ───────────────────────────────────────────────────────
    code-cleanup:
      type: agent
      category: finalize
      agent: "@code-cleanup"
      phase: finalize
      timeout_minutes: 20
      depends_on: [integration-test, live-ui]
      run_if: [Backend, Frontend, Full-Stack, App-Only, Backend-Only]
      auto_skip_if_no_deletions: true
      commit_scope: pipeline

    docs-archived:
      type: agent
      category: finalize
      agent: "@docs-expert"
      phase: finalize
      timeout_minutes: 20
      depends_on: [code-cleanup]
      commit_scope: docs
      generates_change_manifest: true
      salvage_survivor: true

    doc-architect:
      type: agent
      category: finalize
      agent: "@doc-architect"
      phase: finalize
      timeout_minutes: 20
      depends_on: [code-cleanup, docs-archived]
      run_if: [Backend, Frontend, Full-Stack, App-Only, Backend-Only]
      commit_scope: pipeline

    publish-pr:
      type: script
      category: finalize
      phase: finalize
      timeout_minutes: 15
      depends_on: [doc-architect]
      script_type: local-exec
      command: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/publish-pr.sh"
      signals_create_pr: true
      salvage_survivor: true

  # ── Cycle Budgets ──────────────────────────────────────────────────
  max_redevelopment_cycles: 5
  max_redeploy_cycles: 3

  # ── Unfixable Signals ──────────────────────────────────────────────
  # Error substrings that signal conditions no agent can fix.
  # When any signal matches, the pipeline halts for human intervention.
  unfixable_signals:
    - "authorization_requestdenied"
    - "aadsts700016"
    - "aadsts7000215"
    - "application.readwrite"
    - "insufficient privileges"
    - "does not have authorization"
    - "subscription not found"
    - "resource group not found"
    - "cannot apply incomplete plan"
    - "error acquiring the state lock"
    - "resource already exists"
    - "state blob is already locked"

  # ── Fault Routing (Triage-as-Code) ────────────────────────────────
  # Maps fault domains to the exact set of nodes to reset.
  # WYSIWYG: the kernel returns exactly what is declared. No hidden appending.
  # Use "$SELF" to include the calling item (e.g. live-ui, integration-test).
  fault_routing:
    backend:
      description: "application logic errors, 500s, import failures, API bugs"
      reset_nodes: [backend-dev, backend-unit-test, "$SELF"]
    frontend:
      description: "UI rendering, selectors, Playwright failures, CSS/HTML issues"
      reset_nodes: [frontend-dev, frontend-unit-test, "$SELF"]
    both:
      description: "error clearly spans backend and frontend"
      reset_nodes: [backend-dev, backend-unit-test, frontend-dev, frontend-unit-test, "$SELF"]
    schemas:
      reset_nodes: [schema-dev, infra-architect, backend-dev, backend-unit-test, frontend-dev, frontend-unit-test, "$SELF"]
    "frontend+infra":
      reset_nodes: [infra-architect, frontend-dev, frontend-unit-test, "$SELF"]
    "backend+infra":
      reset_nodes: [infra-architect, backend-dev, backend-unit-test, "$SELF"]
    cicd:
      description: "GitHub Actions workflow file errors, deploy pipeline config"
      reset_nodes: [push-app, poll-app-ci]
    deployment-stale:
      reset_nodes: [push-app, poll-app-ci]
    deployment-stale-backend:
      reset_nodes: [push-app, poll-app-ci]
    deployment-stale-frontend:
      reset_nodes: [push-app, poll-app-ci]
    infra:
      description: "missing cloud resources, CORS, auth config, Terraform errors, env vars"
      reset_nodes: [infra-architect, push-infra, poll-infra-plan, create-draft-pr, await-infra-approval, infra-handoff, "$SELF"]
    test-code:
      description: "the test itself is wrong (bad locator, race condition, contradicts spec)"
      reset_nodes: ["$SELF"]
    environment:
      description: "transient auth/credential glitch, not a code bug"
      reset_nodes: ["$SELF"]
    blocked:
      description: "unfixable without human intervention (permissions, subscriptions)"
      reset_nodes: []
