# =============================================================================
# Sample API — OpenAPI 3.0.3
# =============================================================================
# Protected endpoint demonstrating dual-mode auth (demo + Entra ID).
# APIM applies check-header or validate-jwt based on auth_mode.
# =============================================================================
openapi: "3.0.3"
info:
  title: Sample API
  version: "1.0.0"
  description: Sample protected API endpoint.
paths:
  /hello:
    get:
      operationId: hello
      summary: Get a greeting
      description: Returns a greeting message. Protected by APIM auth policy.
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
            default: World
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        "401":
          description: Unauthorized — missing or invalid auth token
  /webhooks:
    get:
      operationId: listWebhooks
      summary: List registered webhooks
      description: Returns all registered webhook URLs. Optionally filter by workspaceId.
      parameters:
        - name: workspaceId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of webhooks
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhooks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Webhook"
        "401":
          description: Unauthorized — missing or invalid auth token
    post:
      operationId: createWebhook
      summary: Register a new webhook URL
      description: Registers a new webhook URL for event dispatching.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - workspaceId
              properties:
                url:
                  type: string
                  format: uri
                workspaceId:
                  type: string
      responses:
        "201":
          description: Webhook created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400":
          description: Invalid request body
        "401":
          description: Unauthorized — missing or invalid auth token
components:
  schemas:
    Webhook:
      type: object
      properties:
        id:
          type: string
        workspaceId:
          type: string
        url:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
