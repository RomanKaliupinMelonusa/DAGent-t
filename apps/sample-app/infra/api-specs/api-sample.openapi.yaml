# =============================================================================
# Sample API — OpenAPI 3.0.3
# =============================================================================
# Protected endpoints demonstrating dual-mode auth (demo + Entra ID).
# APIM applies check-header or validate-jwt based on auth_mode.
# =============================================================================
openapi: "3.0.3"
info:
  title: Sample API
  version: "1.1.0"
  description: Sample protected API — hello endpoint and Kanban task board.
paths:
  /hello:
    get:
      operationId: hello
      summary: Get a greeting
      description: Returns a greeting message. Protected by APIM auth policy.
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
            default: World
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        "401":
          description: Unauthorized — missing or invalid auth token

  /tasks:
    get:
      operationId: listTasks
      summary: List all tasks
      description: Returns all tasks for the default workspace.
      responses:
        "200":
          description: Successful response — array of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "401":
          description: Unauthorized — missing or invalid auth token
    post:
      operationId: createTask
      summary: Create a new task
      description: Creates a new task in the default workspace with status TODO.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTask"
      responses:
        "201":
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid request body
        "401":
          description: Unauthorized — missing or invalid auth token
        "429":
          description: Too many tasks — workspace task limit exceeded

  /tasks/{id}/status:
    patch:
      operationId: updateTaskStatus
      summary: Update task status
      description: Updates the status of an existing task (e.g., TODO → IN_PROGRESS → DONE).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The unique task ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatus"
      responses:
        "200":
          description: Task status updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid request body
        "401":
          description: Unauthorized — missing or invalid auth token
        "404":
          description: Task not found

components:
  schemas:
    TaskStatus:
      type: string
      enum:
        - TODO
        - IN_PROGRESS
        - DONE
      description: Allowed task statuses for the Kanban board columns

    Task:
      type: object
      required:
        - id
        - workspaceId
        - title
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Unique task identifier (UUID)
        workspaceId:
          type: string
          description: Workspace partition key
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Task title
        status:
          $ref: "#/components/schemas/TaskStatus"
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: ISO 8601 last-updated timestamp

    CreateTask:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Title for the new task

    UpdateTaskStatus:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/TaskStatus"
