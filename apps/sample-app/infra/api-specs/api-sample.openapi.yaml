# =============================================================================
# Sample API — OpenAPI 3.0.3
# =============================================================================
# Protected endpoint demonstrating dual-mode auth (demo + Entra ID).
# APIM applies check-header or validate-jwt based on auth_mode.
# =============================================================================
openapi: "3.0.3"
info:
  title: Sample API
  version: "1.0.0"
  description: Sample protected API endpoint.
paths:
  /hello:
    get:
      operationId: hello
      summary: Get a greeting
      description: Returns a greeting message. Protected by APIM auth policy.
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
            default: World
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        "401":
          description: Unauthorized — missing or invalid auth token
  /profile:
    get:
      operationId: getProfile
      summary: Get user profile
      description: Returns the authenticated user's profile details.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - displayName
                  - email
                  - theme
                properties:
                  id:
                    type: string
                    format: uuid
                  displayName:
                    type: string
                    minLength: 2
                    maxLength: 50
                  email:
                    type: string
                    format: email
                  theme:
                    type: string
                    enum:
                      - light
                      - dark
                      - system
        "401":
          description: Unauthorized — missing or invalid auth token
    patch:
      operationId: updateProfile
      summary: Update user profile
      description: Updates the authenticated user's display name and theme preference.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - displayName
                - theme
              properties:
                displayName:
                  type: string
                  minLength: 2
                  maxLength: 50
                theme:
                  type: string
                  enum:
                    - light
                    - dark
                    - system
      responses:
        "200":
          description: Successful update
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - displayName
                  - email
                  - theme
                properties:
                  id:
                    type: string
                    format: uuid
                  displayName:
                    type: string
                    minLength: 2
                    maxLength: 50
                  email:
                    type: string
                    format: email
                  theme:
                    type: string
                    enum:
                      - light
                      - dark
                      - system
        "400":
          description: Bad request — invalid input
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "401":
          description: Unauthorized — missing or invalid auth token
