name: playwright
description: "Playwright browser automation for E2E testing against the storefront"
type: local
# @playwright/mcp is a devDependency of tools/autonomous-factory, but npm
# workspace hoisting installs the binary at {repoRoot}/node_modules/.bin
# (tools/autonomous-factory has no private node_modules for it).
command: "{repoRoot}/node_modules/.bin/playwright-mcp"
args:
  - "--headless"
  - "--no-sandbox"
  - "--browser"
  - "chromium"
  - "--save-session"
  - "--output-dir"
  - "{appRoot}/in-progress/screenshots"
  - "--caps"
  - "vision"
cwd: "{appRoot}"
tools: ["*"]
availability: required
fsMutator: false
