name: playwright
description: "Playwright browser automation for E2E testing against the storefront"
type: local
command: "{repoRoot}/tools/autonomous-factory/node_modules/.bin/playwright-mcp"
args:
  - "--headless"
  - "--no-sandbox"
  - "--browser"
  - "chromium"
  - "--save-session"
  - "--output-dir"
  - "{appRoot}/in-progress/screenshots"
  - "--caps"
  - "vision"
cwd: "{appRoot}"
tools: ["*"]
availability: required
fsMutator: false
