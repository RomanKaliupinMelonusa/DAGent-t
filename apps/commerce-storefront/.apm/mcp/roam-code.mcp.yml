name: roam-code
description: "Roam semantic code intelligence — AST-based structural analysis, blast radius, test gaps"
type: local
command: roam
args: [mcp]
tools: ["*"]
availability: optional
# Tools whose results depend on the current post-write state of the
# code. Listed names cause the harness pre-tool-call gate to await a
# coalesced `CodeIndexer.index()` refresh before forwarding. Other roam
# tools (overview / context-only) do not need a fresh index.
freshness:
  requires_index_refresh:
    - roam_preflight
    - roam_prepare_change
    - roam_review_change
    - roam_diff
    - roam_impact
    - roam_diagnose
    - roam_diagnose_issue
    - roam_affected_tests
    - roam_pr_risk
    - roam_dead_code
    - roam_complexity_report
