name: commerce-storefront
version: 1.0.0
description: "Salesforce B2C Commerce Cloud PWA Kit storefront — headless React + SCAPI"
tokenBudget: 13000

agents:
  spec-compiler:
    # Narrow-scope agent: reads SPEC.md, writes ACCEPTANCE.yml. No impl access.
    # Low token budget — this is an extraction job, not a coding job.
    instructions: [always]
    promptFile: spec-compiler.agent.md
    mcp: []
    skills: []
    toolLimits: { soft: 30, hard: 45 }
    security:
      # Write ACCEPTANCE.yml only. `in-progress/` is the shared pipeline
      # scratch dir; the spec-compiler must not touch feature code.
      allowedWritePaths: ["(^|/)in-progress/.*_ACCEPTANCE\\.yml$"]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform|npm\\s+start|npx\\s+playwright)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent]
  baseline-analyzer:
    # Phase-A sibling of spec-compiler. Runs right after acceptance
    # compilation to capture a pre-feature baseline of console /
    # network / uncaught errors on the pages and modals the feature
    # targets. Output is advisory: triage subtracts the baseline from
    # structured Playwright failures so platform noise never
    # misclassifies as an impl-defect.
    #
    # Uses the existing Playwright MCP server (same pattern as
    # e2e-author / qa-adversary). No roam-code — baseline capture is
    # orthogonal to code indexing.
    instructions: [always]
    promptFile: baseline-analyzer.agent.md
    mcp: [playwright]
    skills: []
    toolLimits: { soft: 45, hard: 65 }
    security:
      # Write exactly one advisory artifact. No code, no specs, no tests.
      allowedWritePaths: ["(^|/)in-progress/.*_BASELINE\\.json$"]
      allowedReadPaths:
        - "^in-progress/.*_(SPEC|ACCEPTANCE)\\."
        - "(^|/)package\\.json$"
        - "^tsconfig"
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform|npm\\s+start|npx\\s+playwright)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent]
      mcp:
        playwright: "*"
  storefront-dev:
    instructions: [always, storefront, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: storefront-dev.agent.md
    mcp: [roam-code]
    skills: [test-storefront-unit, dev-local]
    toolLimits: { soft: 80, hard: 110 }
    security:
      # Session A Item 9 \u2014 implementation-status output lands in the node's
      # invocation outputs/ dir. Allow writes into the slot the Declared I/O
      # block points to (any kind under the node's own outputs path).
      allowedWritePaths:
        - "^app/"
        - "^config/"
        - "^worker/"
        - "^translations/"
        - "(^|/)in-progress/[^/]+/storefront-dev/[^/]+/outputs/.*\\.(json|md|yml|yaml)$"
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  storefront-debug:
    # Runtime-defect debugger. Same write scope as storefront-dev, plus the
    # Playwright MCP for live-browser reproduction against the local dev
    # server. Only activated when triage reroutes a runtime failure
    # (frontend / ssr-hydration / browser-runtime-error / test-code-from-dev)
    # to this node. Sits inline between storefront-dev and
    # storefront-unit-test; auto-skips on the happy path.
    instructions: [always, storefront, storefront/debugging.md, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: storefront-debug.agent.md
    mcp: [roam-code, playwright]
    skills: [test-storefront-unit, dev-local]
    toolLimits: { soft: 90, hard: 120 }
    security:
      # Same mutation surface as storefront-dev. Unit tests and e2e specs are
      # owned by the downstream test nodes — debug must not touch them. The
      # debug agent prompt enforces that contract with explicit forbidden
      # actions; path guards here prevent accidental writes even if the
      # prompt is ignored.
      allowedWritePaths: ["^app/", "^config/", "^worker/", "^translations/", "(^|/)in-progress/.*_DEBUG-NOTES\\.md$"]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
        playwright: "*"
  storefront-unit-test:
    instructions: [always, storefront/testing-mandate.md, tooling/roam-tool-rules.md]
    promptFile: storefront-unit-test.agent.md
    mcp: [roam-code]
    skills: [test-storefront-unit]
    toolLimits: { soft: 60, hard: 90 }
    security:
      allowedWritePaths: ["(^|/)__tests__/", "(^|/)tests/", "\\.test\\.", "\\.spec\\."]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  create-draft-pr:
    instructions: [always]
    promptFile: create-pr.agent.md
    mcp: []
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["(^|/)in-progress/"]
    tools:
      core: [read_file, file_read, view, bash, write_bash, shell, grep_search, list_dir, report_intent]
  e2e-author:
    instructions: [always, storefront/testing-mandate.md, storefront/e2e-guidelines.md, tooling/roam-tool-rules.md]
    promptFile: e2e-author.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 50, hard: 70 }
    security:
      allowedWritePaths: ["(^|/)e2e/", "\\.spec\\."]
      # SDET blind-to-impl guard (Phase A.4). The test author works from the
      # spec + acceptance contract + existing tests + base-template docs
      # ONLY. Reads of feature source (overrides/, config/, app/) are
      # denied so tests cannot be reverse-engineered to match a buggy impl.
      # Patterns are tested against app-relative paths by checkRbac.
      allowedReadPaths:
        - "^in-progress/.*_(SPEC|ACCEPTANCE|CHANGES|SUMMARY)\\."
        - "^e2e/"
        - "(^|/)playwright\\.config\\.(ts|js|mjs)$"
        # Session C — vendored PWA Kit reference snapshot. Replaces the
        # legacy read of `node_modules/@salesforce/retail-react-app/*.md[x]`,
        # which was unstable across patch bumps and untracked by the pin.
        - "^\\.apm/reference/"
        # Allow reading package.json for test framework discovery.
        - "(^|/)package\\.json$"
        - "^tsconfig"
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  qa-adversary:
    # Phase B.2 — Runs after e2e-runner, before create-draft-pr. Attempts
    # to falsify the feature against the acceptance contract using
    # adversarial probes. Same blind-to-impl stance as e2e-author, but
    # it EXECUTES tests and reports violations as JSON.
    instructions: [always]
    promptFile: qa-adversary.agent.md
    # No roam-code MCP — must not index implementation source; oracle is
    # acceptance contract + live DOM only.
    mcp: []
    skills: []
    toolLimits: { soft: 50, hard: 70 }
    security:
      allowedWritePaths:
        - "(^|/)in-progress/.*_QA-REPORT\\.json$"
        - "(^|/)e2e/_qa_.*\\.spec\\.ts$"
      allowedReadPaths:
        - "^in-progress/.*_(SPEC|ACCEPTANCE|CHANGES|SUMMARY|VALIDATION)\\."
        # Session A \u2014 materialized inputs land under
        # `in-progress/<slug>/<nodeKey>/<invocationId>/inputs/<kind>.<ext>`.
        # Allow qa-adversary to read everything the Declared I/O block
        # points it at (acceptance, playwright-report, implementation-status).
        - "^in-progress/.*/inputs/.*\\.(yml|yaml|json|md)$"
        - "^e2e/"
        - "(^|/)playwright\\.config\\.(ts|js|mjs)$"
        - "(^|/)package\\.json$"
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent]
  code-cleanup:
    instructions: [always, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: code-cleanup.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  doc-architect:
    instructions: [always, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: doc-architect.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 40, hard: 55 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  docs-archived:
    instructions: [always, tooling/roam-tool-rules.md]
    promptFile: docs-archived.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"

# ═══════════════════════════════════════════════════════════════════════
# Node Pool — Reusable work units (agent, script, triage)
# Nodes define WHAT to execute; workflows define HOW to connect them.
# ═══════════════════════════════════════════════════════════════════════
nodes:
  # ── Scaffolding ────────────────────────────────────────────────────
  # Pipeline-specific side-effects the kernel must not own. `create-branch`
  # materializes the feature branch; `stage-spec` copies the user-supplied
  # spec (SPEC_FILE) into `_kickoff/spec.md` so spec-compiler / dev agents
  # consume it via their declared `consumes_kickoff: [spec]`.
  create-branch:
    type: script
    category: scaffold
    timeout_minutes: 2
    script_type: local-exec
    command: "bash ${REPO_ROOT}/tools/autonomous-factory/agent-branch.sh create-feature ${featureSlug}"

  stage-spec:
    type: script
    category: scaffold
    timeout_minutes: 2
    script_type: local-exec
    command: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/stage-spec.sh"

  spec-compiler:
    type: agent
    category: dev
    agent: "@spec-compiler"
    timeout_minutes: 10
    # Pipeline scope — this is a pre-feature artifact, not feature code.
    commit_scope: pipeline
    diff_attribution_dirs: []

  baseline-analyzer:
    # Pre-feature page baseline. Runs a live browser against the target
    # pages (PLP, PDP, modals, etc.) named in the spec/acceptance and
    # captures the console / network / uncaught errors that are present
    # BEFORE any feature code is written. Result is consumed by the
    # triage handler as a noise filter so unrelated platform errors
    # never misclassify as feature defects.
    #
    # Graceful by design — a failed baseline must not block the pipeline
    # (see workflows.yml on_failure: blocked → null).
    type: agent
    category: dev
    agent: "@baseline-analyzer"
    timeout_minutes: 10
    # Bring up the local dev server (same pattern as e2e-runner). The
    # post-hook tears it down so the next node starts from a clean slate.
    pre: "bash .apm/hooks/baseline-analyzer-pre.sh"
    post: "bash .apm/hooks/baseline-analyzer-post.sh"
    # Pipeline-scope artifact — does not modify feature code.
    commit_scope: pipeline
    diff_attribution_dirs: []
    circuit_breaker:
      max_item_failures: 2
      halt_on_identical: true

  storefront-dev:
    type: agent
    category: dev
    agent: "@storefront-dev"
    timeout_minutes: 25
    commit_scope: all
    diff_attribution_dirs: [storefront]
    circuit_breaker:
      allows_revert_bypass: true
      allows_timeout_salvage: true

  storefront-debug:
    # Runtime-defect debugger. Auto-skips on the happy path via
    # `auto_skip_unless_triage_reroute`; only performs real work when the
    # triage handler reroutes a runtime failure onto it and writes
    # pendingContext. Uses the Playwright MCP against the local dev server,
    # so the node reuses the e2e-runner pre/post hooks to bring the server
    # up and tear it down.
    type: agent
    category: dev
    agent: "@storefront-debug"
    timeout_minutes: 25
    auto_skip_unless_triage_reroute: true
    pre: "bash .apm/hooks/e2e-runner-pre.sh"
    post: "bash .apm/hooks/e2e-runner-post.sh"
    commit_scope: all
    diff_attribution_dirs: [storefront]
    circuit_breaker:
      allows_revert_bypass: true
      allows_timeout_salvage: true
      max_item_failures: 3
      halt_on_identical: true

  storefront-unit-test:
    type: agent
    category: test
    agent: "@storefront-unit-test"
    timeout_minutes: 15
    auto_skip_if_no_changes_in: [storefront]
    commit_scope: all
    diff_attribution_dirs: [storefront]

  create-draft-pr:
    type: agent
    category: deploy
    agent: "@create-draft-pr"
    timeout_minutes: 15
    commit_scope: pipeline

  e2e-author:
    type: agent
    category: test
    agent: "@e2e-author"
    timeout_minutes: 10
    auto_skip_if_no_changes_in: [storefront, e2e]
    commit_scope: all
    diff_attribution_dirs: [e2e]

  e2e-runner:
    type: script
    category: test
    script_type: local-exec
    command: "npx playwright test e2e/${featureSlug}.spec.ts --workers=1 --max-failures=3"
    auto_skip_if_no_changes_in: [storefront, e2e]
    # Hooks are externalized into bash files so they never parse under dash
    # (the Debian default /bin/sh) and have a stable location that can be
    # diagnosed manually: `bash .apm/hooks/e2e-runner-pre.sh`.
    pre: "bash .apm/hooks/e2e-runner-pre.sh"
    # Round-2 fix R1: the acceptance oracle must run on EVERY e2e failure,
    # not only after a successful deploy. It was previously chained on
    # `poll-app-ci.post` which is downstream of the failure gate and thus
    # never reached when e2e-runner fails (the common case). Running it
    # here populates `<slug>_VALIDATION.json` so triage/contract-evidence
    # can front-load the real verdict instead of the raw ANSI log.
    # The trailing `|| true` is critical: the oracle augments artifacts —
    # it must never mask the underlying e2e failure that triggered it.
    #
    # `emit-playwright-handler-output.ts` is the Phase 4 bridge that
    # parses `$PLAYWRIGHT_JSON_OUTPUT_NAME` and emits
    # `$OUTPUTS_DIR/handler-output.json` so the `handler-output-ingestion`
    # middleware can merge `structuredFailure` into
    # `NodeResult.handlerOutput` (drop-in compatible with the pre-refactor
    # path). No-op when the report file is absent (= Playwright never ran).
    post: "bash .apm/hooks/e2e-runner-post.sh && (${REPO_ROOT}/tools/autonomous-factory/hooks/emit-playwright-handler-output.ts || true) && (node ${REPO_ROOT}/tools/autonomous-factory/hooks/validate-acceptance.mjs \"${APP_ROOT}\" \"${SLUG}\" || true)"
    # Dev server boot polls up to 120 s; give the hook 5 minutes headroom
    # (default 30 s would kill the hook before it could succeed).
    timeout_minutes: 10
    # Structured-failure extractor — local-exec sets PLAYWRIGHT_JSON_OUTPUT_NAME
    # to this path, parses the JSON reporter on failure, and exposes the
    # parsed shape on handlerOutput.structuredFailure. Triage prefers
    # structured payloads over raw stdout for classification.
    structured_failure:
      format: playwright-json
      path: "in-progress/${featureSlug}_PW-REPORT.json"
    circuit_breaker:
      halt_on_identical: true

  qa-adversary:
    # Phase B.2 — Adversarial QA pass. Runs after e2e-runner (which
    # tore the dev server down), so it re-uses the same pre/post hooks
    # to bring the server back up for its own probe suite. Writes a
    # QA-REPORT.json that Phase C triage consumes as structured evidence.
    type: agent
    category: test
    agent: "@qa-adversary"
    timeout_minutes: 15
    auto_skip_if_no_changes_in: [storefront, e2e]
    pre: "bash .apm/hooks/e2e-runner-pre.sh"
    post: "bash .apm/hooks/e2e-runner-post.sh"
    commit_scope: pipeline
    diff_attribution_dirs: []

  code-cleanup:
    type: agent
    category: finalize
    agent: "@code-cleanup"
    timeout_minutes: 15
    auto_skip_if_no_deletions: true
    commit_scope: pipeline
    salvage_survivor: true

  docs-archived:
    type: agent
    category: finalize
    agent: "@docs-archived"
    timeout_minutes: 15
    commit_scope: docs
    generates_change_manifest: true
    salvage_survivor: true

  doc-architect:
    type: agent
    category: finalize
    agent: "@doc-architect"
    timeout_minutes: 15
    commit_scope: pipeline

  push-app:
    type: script
    category: deploy
    timeout_minutes: 15
    script_type: local-exec
    command: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/push-and-sentinel.sh"
    pre: "bash .apm/hooks/push-app-pre.sh"
    post: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/write-deploy-sentinels.sh"
    captures_head_sha: true
    circuit_breaker:
      halt_on_identical: true

  poll-app-ci:
    type: script
    category: deploy
    timeout_minutes: 15
    script_type: poll
    ci_workflow_key: app
    # Post-deploy reachability check. The acceptance oracle moved to
    # `e2e-runner.post` in Round-2 R1 — running it here again would be
    # redundant once e2e has already passed (same contract, same URL
    # target against localhost:3000 via the Managed Runtime preview).
    post: "bash .apm/hooks/validate-app.sh"
    captures_head_sha: true
    circuit_breaker:
      halt_on_identical: true

  publish-pr:
    type: script
    category: deploy
    timeout_minutes: 15
    script_type: local-exec
    command: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/publish-pr.sh"
    signals_create_pr: true
    salvage_survivor: true
    captures_head_sha: true
    circuit_breaker:
      halt_on_identical: true

  triage-node:
    type: triage
    category: finalize
    timeout_minutes: 5
    node_kind: control-flow
    circuit_breaker:
      allows_timeout_salvage: true

config:
  defaultToolLimits: { soft: 60, hard: 80, fileReadLineLimit: 500, shellOutputLimit: 64000, shellTimeoutMs: 600000, idleTimeoutLimit: 2 }
  # ── Error-signature fingerprinter: framework-specific volatile tokens.
  # Stripped in addition to the built-in stack-agnostic defaults before
  # hashing. Without these, rotating per-run tokens (Playwright totals,
  # commit-ahead counters, durations) produce a different signature every
  # cycle and defeat halt_on_identical.
  #
  # Lives at top-level `config:` because the runtime reads
  # `apmContext.config.error_signature.volatile_patterns` (see
  # `entry/main.ts`); workflow-scoped `error_signature:` blocks are
  # currently dead config.
  error_signature:
    volatile_patterns:
      - { pattern: '\d+ passed(?:, \d+ failed)?(?:, \d+ total)?', replacement: "<PW_TOTALS>" }
      - { pattern: 'Running \d+ tests? using \d+ workers?',      replacement: "<PW_RUN>" }
      - { pattern: '\[\d+/\d+\]',                                 replacement: "<PW_PROGRESS>" }
      - { pattern: '\(\d+(?:\.\d+)?\s*(?:ms|m|s)\)',              replacement: "<DUR>" }
      - { pattern: 'Timeout \d+ms exceeded',                      replacement: "Timeout <MS>ms exceeded" }
      - { pattern: 'test-results/[^\s)"''`]+',                    replacement: "<TEST_RESULT>" }
      - { pattern: 'attachment #\d+',                             replacement: "attachment #<N>" }
      - { pattern: '\d+ did not run',                             replacement: "<PW_NOTRUN>" }
      # publish-pr / agent-commit.sh — the rotating "N commit(s) ahead of
      # <upstream>" counter and the "branch '...' set up to track '...'"
      # line both drift between cycles even when the underlying root cause
      # is identical. Without these, halt_on_identical never fires for
      # repeated publish-pr no-op-dev failures.
      - { pattern: '\d+\s+commit\(s\)\s+ahead\s+of\s+\S+',        replacement: "<COMMITS_AHEAD>" }
      - { pattern: "branch\\s+'[^']+'\\s+set up to track\\s+'[^']+'", replacement: "<BRANCH_TRACKING>" }
  # Session A (Item 8) — require every inline artifact written through the
  # bus to ship the {schemaVersion, producedBy, producedAt} envelope. Engine
  # producers (node-report, triage-handoff) emit it natively; agent-written
  # files bypass the bus and are unaffected. Kept off in sample-app until
  # its producers are migrated.
  strict_artifacts: true
  # Raw-mode redevelopment context. The storefront has repeatedly looped on
  # SSR hydration errors where the LLM-condensed "Automated Diagnosis" block
  # misdirected the dev agent. Switch to historian + raw failure output.
  context:
    raw_mode: true
  # Phase 4 operational hardening.
  policy:
    max_iterations: 500
    max_idle_minutes: 45
    max_total_failures: 15
    approval_default_timeout_hours: 24
    approval_default_on_timeout: halt
  hooks:
    resolveEnvironment: "bash .apm/hooks/resolve-env.sh"
    validateApp: "bash .apm/hooks/validate-app.sh"
    preflightAuth: "bash .apm/hooks/preflight-auth.sh"
    preflightBaseline: "bash .apm/hooks/validate-app.sh --baseline"
  environment:
    STOREFRONT_URL: "${MRT_STOREFRONT_URL}"
    COMMERCE_CLIENT_ID: "${COMMERCE_CLIENT_ID}"
    COMMERCE_ORG_ID: "${COMMERCE_ORG_ID}"
    COMMERCE_SHORT_CODE: "${COMMERCE_SHORT_CODE}"
    COMMERCE_SITE_ID: "${COMMERCE_SITE_ID}"
    MRT_PROJECT_ID: "${MRT_PROJECT_ID}"
  directories:
    storefront: "."
    e2e: e2e
  testCommands:
    storefrontUnit: "cd {appRoot} && npx jest --verbose"
  ciJobs:
    storefront: "Storefront"
  ciWorkflows:
    app: "Deploy Storefront"
    filePatterns: ["deploy-storefront.yml"]

  # Session C — PWA Kit base-template version pinning. The spec-compiler,
  # storefront-dev, storefront-debug, and e2e-author agents all reason about
  # `@salesforce/retail-react-app` exports; a silent `npm install` bump
  # would rewire their mental model with no triage signal. Bootstrap reads
  # the installed version from package-lock.json and fails fatally if it
  # drifts outside the declared range. When an API-surface snapshot exists
  # under `reference_dir/pwa-kit/api-surface.json`, bootstrap also diffs
  # the live package against it and injects any delta as an advisory
  # "Upstream API Drift Notice" into the dev agents' prompts. To accept a
  # deliberate bump: bump the range below, then regenerate the snapshot
  # with `node tools/autonomous-factory/scripts/snapshot-pwa-kit-api.mjs
  # apps/commerce-storefront`.
  dependencies:
    pinned:
      "@salesforce/retail-react-app": "~9.1.1"
    reference_dir: .apm/reference
