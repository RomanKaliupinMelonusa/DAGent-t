name: commerce-storefront
version: 1.0.0
description: "Salesforce B2C Commerce Cloud PWA Kit storefront — headless React + SCAPI"
tokenBudget: 8000

agents:
  schema-dev:
    instructions: [always, storefront/config-management.md, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: schema-dev.agent.md
    mcp: [roam-code]
    skills: [test-storefront-unit]
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^app/", "^config/"]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  storefront-dev:
    instructions: [always, storefront, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: storefront-dev.agent.md
    mcp: [roam-code]
    skills: [test-storefront-unit, dev-local]
    toolLimits: { soft: 80, hard: 110 }
    security:
      allowedWritePaths: ["^app/", "^config/", "^worker/", "^translations/"]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  storefront-unit-test:
    instructions: [always, storefront/testing-mandate.md, tooling/roam-tool-rules.md]
    promptFile: storefront-unit-test.agent.md
    mcp: [roam-code]
    skills: [test-storefront-unit]
    toolLimits: { soft: 60, hard: 90 }
    security:
      allowedWritePaths: ["(^|/)__tests__/", "(^|/)tests/", "\\.test\\.", "\\.spec\\."]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  create-draft-pr:
    instructions: [always]
    promptFile: create-pr.agent.md
    mcp: []
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, bash, write_bash, shell, grep_search, list_dir, report_intent]
  live-ui:
    instructions: [always, storefront/testing-mandate.md, storefront/qa-mindset.md, tooling/roam-tool-rules.md]
    promptFile: live-ui.agent.md
    mcp: [roam-code, playwright]
    skills: []
    toolLimits: { soft: 50, hard: 70 }
    security:
      allowedWritePaths: ["(^|/)e2e/", "\\.spec\\."]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
        playwright: "*"
  code-cleanup:
    instructions: [always, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: code-cleanup.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  doc-architect:
    instructions: [always, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: doc-architect.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 40, hard: 55 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  docs-archived:
    instructions: [always, tooling/roam-tool-rules.md]
    promptFile: docs-archived.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  publish-pr:
    instructions: [always]
    promptFile: publish-pr.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, bash, write_bash, shell, grep_search, list_dir, report_intent]
      mcp:
        roam-code: "*"

config:
  defaultToolLimits: { soft: 60, hard: 80 }
  hooks:
    resolveEnvironment: "bash .apm/hooks/resolve-env.sh"
    validateApp: "bash .apm/hooks/validate-app.sh"
    preflightAuth: "bash .apm/hooks/preflight-auth.sh"
  environment:
    STOREFRONT_URL: "${MRT_STOREFRONT_URL}"
    COMMERCE_CLIENT_ID: "${COMMERCE_CLIENT_ID}"
    COMMERCE_ORG_ID: "${COMMERCE_ORG_ID}"
    COMMERCE_SHORT_CODE: "${COMMERCE_SHORT_CODE}"
    COMMERCE_SITE_ID: "${COMMERCE_SITE_ID}"
    MRT_PROJECT_ID: "${MRT_PROJECT_ID}"
  directories:
    storefront: "."
    e2e: e2e
  testCommands:
    storefrontUnit: "cd {appRoot} && npx jest --verbose"
  ciJobs:
    storefront: "Storefront"
  ciWorkflows:
    app: "Deploy Storefront"
    filePatterns: ["deploy-storefront.yml"]
