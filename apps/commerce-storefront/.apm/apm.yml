name: commerce-storefront
version: 1.0.0
description: "Salesforce B2C Commerce Cloud PWA Kit storefront — headless React + SCAPI"
tokenBudget: 10000

agents:
  spec-compiler:
    # Narrow-scope agent: reads SPEC.md, writes ACCEPTANCE.yml. No impl access.
    # Low token budget — this is an extraction job, not a coding job.
    instructions: [always]
    promptFile: spec-compiler.agent.md
    mcp: []
    skills: []
    toolLimits: { soft: 30, hard: 45 }
    security:
      # Write ACCEPTANCE.yml only. `in-progress/` is the shared pipeline
      # scratch dir; the spec-compiler must not touch feature code.
      allowedWritePaths: ["(^|/)in-progress/.*_ACCEPTANCE\\.yml$"]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform|npm\\s+start|npx\\s+playwright)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent]
  storefront-dev:
    instructions: [always, storefront, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: storefront-dev.agent.md
    mcp: [roam-code]
    skills: [test-storefront-unit, dev-local]
    toolLimits: { soft: 80, hard: 110 }
    security:
      allowedWritePaths: ["^app/", "^config/", "^worker/", "^translations/"]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  storefront-unit-test:
    instructions: [always, storefront/testing-mandate.md, tooling/roam-tool-rules.md]
    promptFile: storefront-unit-test.agent.md
    mcp: [roam-code]
    skills: [test-storefront-unit]
    toolLimits: { soft: 60, hard: 90 }
    security:
      allowedWritePaths: ["(^|/)__tests__/", "(^|/)tests/", "\\.test\\.", "\\.spec\\."]
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  create-draft-pr:
    instructions: [always]
    promptFile: create-pr.agent.md
    mcp: []
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["(^|/)in-progress/"]
    tools:
      core: [read_file, file_read, view, bash, write_bash, shell, grep_search, list_dir, report_intent]
  e2e-author:
    instructions: [always, storefront/testing-mandate.md, storefront/e2e-guidelines.md, tooling/roam-tool-rules.md]
    promptFile: e2e-author.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 50, hard: 70 }
    security:
      allowedWritePaths: ["(^|/)e2e/", "\\.spec\\."]
      # SDET blind-to-impl guard (Phase A.4). The test author works from the
      # spec + acceptance contract + existing tests + base-template docs
      # ONLY. Reads of feature source (overrides/, config/, app/) are
      # denied so tests cannot be reverse-engineered to match a buggy impl.
      # Patterns are tested against app-relative paths by checkRbac.
      allowedReadPaths:
        - "^in-progress/.*_(SPEC|ACCEPTANCE|CHANGES|SUMMARY)\\."
        - "^e2e/"
        - "(^|/)playwright\\.config\\.(ts|js|mjs)$"
        # Allow reading base-template documentation (read-only learning).
        - "^node_modules/@salesforce/retail-react-app/.*\\.(md|mdx)$"
        # Allow reading package.json for test framework discovery.
        - "(^|/)package\\.json$"
        - "^tsconfig"
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  qa-adversary:
    # Phase B.2 — Runs after e2e-runner, before create-draft-pr. Attempts
    # to falsify the feature against the acceptance contract using
    # adversarial probes. Same blind-to-impl stance as e2e-author, but
    # it EXECUTES tests and reports violations as JSON.
    instructions: [always]
    promptFile: qa-adversary.agent.md
    # No roam-code MCP — must not index implementation source; oracle is
    # acceptance contract + live DOM only.
    mcp: []
    skills: []
    toolLimits: { soft: 50, hard: 70 }
    security:
      allowedWritePaths:
        - "(^|/)in-progress/.*_QA-REPORT\\.json$"
        - "(^|/)e2e/_qa_.*\\.spec\\.ts$"
      allowedReadPaths:
        - "^in-progress/.*_(SPEC|ACCEPTANCE|CHANGES|SUMMARY|VALIDATION)\\."
        - "^e2e/"
        - "(^|/)playwright\\.config\\.(ts|js|mjs)$"
        - "(^|/)package\\.json$"
      blockedCommandRegexes: ["(^|\\s)(az|aws|terraform)($|\\s)"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent]
  code-cleanup:
    instructions: [always, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: code-cleanup.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  doc-architect:
    instructions: [always, tooling/roam-tool-rules.md, tooling/roam-efficiency.md]
    promptFile: doc-architect.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 40, hard: 55 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"
  docs-archived:
    instructions: [always, tooling/roam-tool-rules.md]
    promptFile: docs-archived.agent.md
    mcp: [roam-code]
    skills: []
    toolLimits: { soft: 60, hard: 80 }
    security:
      allowedWritePaths: ["^.*"]
    tools:
      core: [read_file, file_read, view, write_file, edit_file, bash, write_bash, shell, grep_search, list_dir, report_intent, semantic_search]
      mcp:
        roam-code: "*"

# ═══════════════════════════════════════════════════════════════════════
# Node Pool — Reusable work units (agent, script, triage)
# Nodes define WHAT to execute; workflows define HOW to connect them.
# ═══════════════════════════════════════════════════════════════════════
nodes:
  spec-compiler:
    type: agent
    category: dev
    agent: "@spec-compiler"
    timeout_minutes: 10
    # Pipeline scope — this is a pre-feature artifact, not feature code.
    commit_scope: pipeline
    diff_attribution_dirs: []

  storefront-dev:
    type: agent
    category: dev
    agent: "@storefront-dev"
    timeout_minutes: 25
    commit_scope: all
    diff_attribution_dirs: [storefront]
    circuit_breaker:
      allows_revert_bypass: true
      allows_timeout_salvage: true

  storefront-unit-test:
    type: agent
    category: test
    agent: "@storefront-test"
    timeout_minutes: 15
    auto_skip_if_no_changes_in: [storefront]
    commit_scope: all
    diff_attribution_dirs: [storefront]

  create-draft-pr:
    type: agent
    category: deploy
    agent: "@pr-creator"
    timeout_minutes: 15
    commit_scope: pipeline

  e2e-author:
    type: agent
    category: test
    agent: "@sdet-expert"
    timeout_minutes: 10
    auto_skip_if_no_changes_in: [storefront, e2e]
    commit_scope: all
    diff_attribution_dirs: [e2e]

  e2e-runner:
    type: script
    category: test
    script_type: local-exec
    command: "npx playwright test e2e/${featureSlug}.spec.ts --workers=1 --max-failures=3"
    auto_skip_if_no_changes_in: [storefront, e2e]
    # Hooks are externalized into bash files so they never parse under dash
    # (the Debian default /bin/sh) and have a stable location that can be
    # diagnosed manually: `bash .apm/hooks/e2e-runner-pre.sh`.
    pre: "bash .apm/hooks/e2e-runner-pre.sh"
    post: "bash .apm/hooks/e2e-runner-post.sh"
    # Dev server boot polls up to 120 s; give the hook 5 minutes headroom
    # (default 30 s would kill the hook before it could succeed).
    timeout_minutes: 10
    # Structured-failure extractor — local-exec sets PLAYWRIGHT_JSON_OUTPUT_NAME
    # to this path, parses the JSON reporter on failure, and exposes the
    # parsed shape on handlerOutput.structuredFailure. Triage prefers
    # structured payloads over raw stdout for classification.
    structured_failure:
      format: playwright-json
      path: "in-progress/${featureSlug}_PW-REPORT.json"
    circuit_breaker:
      halt_on_identical: true

  qa-adversary:
    # Phase B.2 — Adversarial QA pass. Runs after e2e-runner (which
    # tore the dev server down), so it re-uses the same pre/post hooks
    # to bring the server back up for its own probe suite. Writes a
    # QA-REPORT.json that Phase C triage consumes as structured evidence.
    type: agent
    category: test
    agent: "@qa-adversary"
    timeout_minutes: 15
    auto_skip_if_no_changes_in: [storefront, e2e]
    pre: "bash .apm/hooks/e2e-runner-pre.sh"
    post: "bash .apm/hooks/e2e-runner-post.sh"
    commit_scope: pipeline
    diff_attribution_dirs: []

  code-cleanup:
    type: agent
    category: finalize
    agent: "@code-cleanup"
    timeout_minutes: 15
    auto_skip_if_no_deletions: true
    commit_scope: pipeline
    salvage_survivor: true

  docs-archived:
    type: agent
    category: finalize
    agent: "@docs-expert"
    timeout_minutes: 15
    commit_scope: docs
    generates_change_manifest: true
    salvage_survivor: true

  doc-architect:
    type: agent
    category: finalize
    agent: "@doc-architect"
    timeout_minutes: 15
    commit_scope: pipeline

  push-app:
    type: script
    category: deploy
    timeout_minutes: 15
    script_type: local-exec
    command: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/push-and-sentinel.sh"
    post: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/write-deploy-sentinels.sh"
    captures_head_sha: true
    circuit_breaker:
      halt_on_identical: true

  poll-app-ci:
    type: script
    category: deploy
    timeout_minutes: 15
    script_type: poll
    ci_workflow_key: app
    # Post-deploy oracle: validate-app.sh covers HTTP reachability; the
    # acceptance oracle replays the feature's compiled contract against the
    # live URL. The acceptance oracle is shipped with the orchestrator so
    # agents cannot tamper with it mid-cycle.
    post: "bash .apm/hooks/validate-app.sh && node ${REPO_ROOT}/tools/autonomous-factory/hooks/validate-acceptance.mjs"
    captures_head_sha: true
    circuit_breaker:
      halt_on_identical: true

  publish-pr:
    type: script
    category: deploy
    timeout_minutes: 15
    script_type: local-exec
    command: "bash ${REPO_ROOT}/tools/autonomous-factory/hooks/publish-pr.sh"
    signals_create_pr: true
    salvage_survivor: true
    captures_head_sha: true
    circuit_breaker:
      halt_on_identical: true

  triage-node:
    type: triage
    category: finalize
    timeout_minutes: 5
    node_kind: control-flow
    circuit_breaker:
      allows_timeout_salvage: true

config:
  defaultToolLimits: { soft: 60, hard: 80, fileReadLineLimit: 500, shellOutputLimit: 64000, shellTimeoutMs: 600000, idleTimeoutLimit: 2 }
  # Raw-mode redevelopment context. The storefront has repeatedly looped on
  # SSR hydration errors where the LLM-condensed "Automated Diagnosis" block
  # misdirected the dev agent. Switch to historian + raw failure output.
  context:
    raw_mode: true
  # Phase 4 operational hardening.
  policy:
    max_iterations: 500
    max_idle_minutes: 45
    max_total_failures: 15
    approval_default_timeout_hours: 24
    approval_default_on_timeout: halt
  hooks:
    resolveEnvironment: "bash .apm/hooks/resolve-env.sh"
    validateApp: "bash .apm/hooks/validate-app.sh"
    preflightAuth: "bash .apm/hooks/preflight-auth.sh"
    preflightBaseline: "bash .apm/hooks/validate-app.sh --baseline"
  environment:
    STOREFRONT_URL: "${MRT_STOREFRONT_URL}"
    COMMERCE_CLIENT_ID: "${COMMERCE_CLIENT_ID}"
    COMMERCE_ORG_ID: "${COMMERCE_ORG_ID}"
    COMMERCE_SHORT_CODE: "${COMMERCE_SHORT_CODE}"
    COMMERCE_SITE_ID: "${COMMERCE_SITE_ID}"
    MRT_PROJECT_ID: "${MRT_PROJECT_ID}"
  directories:
    storefront: "."
    e2e: e2e
  testCommands:
    storefrontUnit: "cd {appRoot} && npx jest --verbose"
  ciJobs:
    storefront: "Storefront"
  ciWorkflows:
    app: "Deploy Storefront"
    filePatterns: ["deploy-storefront.yml"]
