# workflows.yml — Declarative DAG for the commerce-storefront pipeline.
#
# 11-node DAG: no infra wave (Managed Runtime is SaaS),
# no backend nodes (SCAPI is SaaS). Backend extension nodes can be
# added later without kernel changes.
#
# PWA Kit runs locally via `npm start`, so Playwright live-ui tests
# execute BEFORE code push — the deploy phase is the final step.
#
# Workflow types: Storefront, Full-Stack (future: with backend extensions)

default:
  phases:
    - setup
    - pre-deploy
    - validation
    - finalize
    - deploy

  nodes:
    # ── Setup ──────────────────────────────────────────────────────────
    schema-dev:
      type: agent
      category: dev
      agent: "@schema-dev"
      phase: setup
      timeout_minutes: 15
      depends_on: []
      run_if: [Storefront, Full-Stack]
      commit_scope: all
      diff_attribution_dirs: [storefront]

    # ── Development ────────────────────────────────────────────────────
    storefront-dev:
      type: agent
      category: dev
      agent: "@storefront-dev"
      phase: pre-deploy
      timeout_minutes: 25
      depends_on: [schema-dev]
      run_if: [Storefront, Full-Stack]
      commit_scope: all
      diff_attribution_dirs: [storefront, e2e]

    storefront-unit-test:
      type: agent
      category: test
      agent: "@storefront-test"
      phase: pre-deploy
      timeout_minutes: 15
      depends_on: [storefront-dev]
      run_if: [Storefront, Full-Stack]
      auto_skip_if_no_changes_in: [storefront]
      triage_json_gated: true
      commit_scope: all
      diff_attribution_dirs: [storefront]

    create-draft-pr:
      type: agent
      category: deploy
      agent: "@pr-creator"
      phase: pre-deploy
      timeout_minutes: 15
      depends_on: [storefront-unit-test]
      commit_scope: pipeline

    # ── Validation (local Playwright — no deploy needed) ───────────────
    live-ui:
      type: agent
      category: test
      agent: "@storefront-ui-test"
      phase: validation
      timeout_minutes: 15
      depends_on: [storefront-unit-test]
      run_if: [Storefront, Full-Stack]
      auto_skip_if_no_changes_in: [storefront, e2e]
      triage_json_gated: true
      template_flags: ["isLiveUi"]
      commit_scope: pipeline
      diff_attribution_dirs: [storefront, e2e]

    # ── Finalize ───────────────────────────────────────────────────────
    code-cleanup:
      type: agent
      category: finalize
      agent: "@code-cleanup"
      phase: finalize
      timeout_minutes: 15
      depends_on: [live-ui]
      run_if: [Storefront, Full-Stack]
      auto_skip_if_no_deletions: true
      commit_scope: pipeline
      salvage_survivor: true

    docs-archived:
      type: agent
      category: finalize
      agent: "@docs-expert"
      phase: finalize
      timeout_minutes: 15
      depends_on: [code-cleanup]
      commit_scope: docs
      generates_change_manifest: true
      salvage_survivor: true

    doc-architect:
      type: agent
      category: finalize
      agent: "@doc-architect"
      phase: finalize
      timeout_minutes: 15
      depends_on: [code-cleanup, docs-archived]
      run_if: [Storefront, Full-Stack]
      commit_scope: pipeline

    # ── Deploy (push to Managed Runtime after all code changes) ────────
    push-app:
      type: script
      category: deploy
      agent: "@deploy-manager"
      phase: deploy
      timeout_minutes: 15
      depends_on: [doc-architect]
      run_if: [Storefront, Full-Stack]
      commit_scope: pipeline
      writes_deploy_sentinel: true
      script_type: push

    poll-app-ci:
      type: script
      category: deploy
      agent: "@deploy-manager"
      phase: deploy
      timeout_minutes: 15
      depends_on: [push-app]
      run_if: [Storefront, Full-Stack]
      triage_json_gated: true
      commit_scope: pipeline
      script_type: poll
      poll_target: push-app
      ci_workflow_key: app
      post_run_hook: validateApp

    publish-pr:
      type: script
      category: deploy
      agent: "@pr-creator"
      phase: deploy
      timeout_minutes: 15
      depends_on: [poll-app-ci]
      commit_scope: pipeline
      script_type: publish
      salvage_survivor: true

  # ── Cycle Budgets ──────────────────────────────────────────────────
  max_redevelopment_cycles: 5
  max_redeploy_cycles: 3

  # ── Unfixable Signals ──────────────────────────────────────────────
  unfixable_signals:
    - "unauthorized_client"
    - "invalid_client"
    - "account_suspended"
    - "organization not found"
    - "slas client not found"

  # ── Fault Routing (Triage-as-Code) ────────────────────────────────
  # Simplified: no backend/infra domains. Storefront is the primary domain.
  fault_routing:
    frontend:
      description: "UI rendering, Chakra components, commerce-sdk-react hook errors, Playwright failures"
      reset_nodes: [storefront-dev, storefront-unit-test, "$SELF"]
    schemas:
      description: "Shared schema/type contract errors"
      reset_nodes: [schema-dev, storefront-dev, storefront-unit-test, "$SELF"]
    cicd:
      description: "GitHub Actions workflow file errors, deploy pipeline config"
      reset_nodes: [push-app, poll-app-ci]
    deployment-stale:
      reset_nodes: [push-app, poll-app-ci]
    test-code:
      description: "the test itself is wrong (bad locator, race condition, contradicts spec)"
      reset_nodes: ["$SELF"]
    test-code-from-dev:
      description: "Test code is broken, but it was written by the upstream developer agent, not the current QA agent."
      reset_nodes:
        - storefront-dev
        - storefront-unit-test
        - "$SELF"
    environment:
      description: "transient auth/credential glitch, SLAS token failure, not a code bug"
      reset_nodes: ["$SELF"]
    blocked:
      description: "unfixable without human intervention (permissions, SFCC access)"
      reset_nodes: []
