# workflows.yml — Declarative DAG for the commerce-storefront pipeline.
#
# Structure:
#   <workflow-name>: Named workflow DAGs. Each is self-contained.
#
# Node definitions live in apm.yml → nodes: (the pool).
# Compiler merges pool defaults → workflow node (workflow fields win).
# Graph-only fields (depends_on, on_failure, poll_target, triage_profile)
# are NEVER inherited from the pool.
#
# 11-node DAG (no infra wave — Managed Runtime is SaaS, no barrier — depends_on handles fan-in),
# no backend nodes (SCAPI is SaaS). Backend extension nodes can be
# added later without kernel changes.
#
# PWA Kit runs locally via `npm start`, so Playwright E2E tests
# execute BEFORE code push — the deploy phase is the final step.

# ═══════════════════════════════════════════════════════════════════════
# Workflow: storefront
# ═══════════════════════════════════════════════════════════════════════
storefront:
  description: "Storefront pipeline: dev → unit test → E2E → deploy → finalize"

  default_triage: triage-storefront

  nodes:
    # ── Acceptance contract compilation ───────────────────────────────
    # Runs first. Produces the machine-checkable ACCEPTANCE.yml that
    # storefront-dev, e2e-author, validate-acceptance (Phase B), and
    # qa-adversary (Phase B.2) all score against. Separating contract
    # authoring from implementation prevents the dev agent from rewriting
    # its own acceptance criteria during redevelopment cycles.
    spec-compiler:
      depends_on: []
      # Bounded self-repair loop for schema violations. The
      # acceptance-integrity middleware produces canonical errors like
      # `[acceptance:…] schema violation: required_flows.N.steps: …` which
      # the L0 classifier matches (classifyRawError → schema-violation).
      # The failing ACCEPTANCE.yml is left on disk so the agent can patch
      # the specific field rather than regenerate. halt_on_identical stops
      # the ping-pong when the agent can't fix itself; max_item_failures
      # caps the total attempts.
      circuit_breaker:
        max_item_failures: 3
        halt_on_identical: true
      on_failure:
        triage: triage-storefront
        routes:
          # Route structurally-invalid ACCEPTANCE.yml back to spec-compiler
          # itself for a repair pass. Bounded by circuit_breaker above.
          schema-violation: spec-compiler
          # Any other classification for a spec-compiler failure is
          # unrecoverable — blocked means human review + salvage.
          blocked: null

    # ── Pre-feature baseline ──────────────────────────────────────────
    # Captures console/network/uncaught errors on the pages and modals
    # the feature will touch, BEFORE any code is written. The triage
    # engine consumes the resulting `_BASELINE.json` as a noise filter
    # so pre-existing platform errors never misclassify as feature
    # defects. Advisory: failure never blocks the pipeline.
    baseline-analyzer:
      depends_on: [spec-compiler]
      circuit_breaker:
        max_item_failures: 2
        halt_on_identical: true
      on_failure:
        triage: triage-storefront
        routes:
          # Transient dev-server / Playwright MCP glitches — retry once.
          environment: "$SELF"
          # Anything else: degrade gracefully. Downstream nodes proceed
          # without a baseline — triage.filterNoise becomes a no-op.
          blocked: null

    # ── Development ────────────────────────────────────────────────────
    storefront-dev:
      depends_on: [spec-compiler, baseline-analyzer]

    # ── Runtime-defect debugger ───────────────────────────────────────
    # Sits inline between storefront-dev and storefront-unit-test. On the
    # happy path (no triage reroute) the node auto-skips via
    # `auto_skip_unless_triage_reroute`. When triage reroutes a runtime
    # failure (frontend / ssr-hydration / browser-runtime-error /
    # test-code-from-dev) onto this node, it reproduces the failure via
    # the Playwright MCP, patches the minimum diff, and lets the DAG
    # re-run storefront-unit-test → e2e-author → e2e-runner → qa-adversary.
    storefront-debug:
      depends_on: [storefront-dev]
      on_failure:
        triage: triage-storefront
        routes:
          # Debug couldn't fix the runtime bug — retry itself (bounded by
          # circuit_breaker.max_item_failures in apm.yml).
          frontend: "$SELF"
          ssr-hydration: "$SELF"
          browser-runtime-error: "$SELF"
          test-code-from-dev: "$SELF"
          # Debug concluded the Playwright spec itself is the defect —
          # hand off to the SDET.
          test-code: e2e-author
          environment: "$SELF"
          # Unfixable → graceful salvage via the triage handler.
          blocked: null

    storefront-unit-test:
      depends_on: [storefront-debug]
      on_failure:
        triage: triage-storefront
        routes:
          # Unit-test failures indicate a shallow impl bug that does not
          # require live-browser investigation — keep routing to dev.
          frontend: storefront-dev
          test-code: storefront-dev
          environment: "$SELF"
          blocked: null

    # ── Validation (Author/Runner — SDET writes, native exec runs) ────
    e2e-author:
      depends_on: [storefront-unit-test]

    e2e-runner:
      depends_on: [e2e-author]
      on_failure:
        triage: triage-storefront
        routes:
          # Runtime defects visible in a live browser route to the debugger,
          # not back to the full dev agent. Debug will re-run the Playwright
          # spec via MCP after patching; the DAG cascade then re-runs
          # storefront-unit-test → e2e-author → e2e-runner downstream.
          frontend: storefront-debug
          # Pure test bugs (bad locator, race condition) remain the SDET's
          # responsibility.
          test-code: e2e-author
          # Test code the dev agent produced (e.g. a storefront helper that
          # a spec imports) — debug investigates; if it's genuinely a test
          # problem debug's own on_failure.test-code reroutes to e2e-author.
          test-code-from-dev: storefront-debug
          ssr-hydration: storefront-debug
          # Contract-violation pre-classifier — uncaught browser runtime
          # errors captured by the Playwright JSON reporter route here
          # deterministically (no RAG, no LLM).
          browser-runtime-error: storefront-debug
          environment: "$SELF"
          blocked: null

    # ── Adversarial QA pass (Phase B.2) ───────────────────────────────
    # Attempts to falsify the feature against the acceptance contract.
    # Writes `<slug>_QA-REPORT.json`; any violation fails this node and
    # routes runtime defects to the debug agent for redevelopment.
    qa-adversary:
      depends_on: [e2e-runner]
      on_failure:
        triage: triage-storefront
        routes:
          # QA-discovered acceptance violations route to the debugger so
          # it can reproduce the adversarial probe in a live browser.
          frontend: storefront-debug
          browser-runtime-error: storefront-debug
          ssr-hydration: storefront-debug
          # The QA probes themselves can be wrong (e.g. impossible flow).
          test-code: qa-adversary
          environment: "$SELF"
          blocked: null

    create-draft-pr:
      depends_on: [storefront-unit-test, e2e-author, qa-adversary]

    # ── Finalize ───────────────────────────────────────────────────────
    code-cleanup:
      depends_on: [e2e-runner, qa-adversary, create-draft-pr]

    docs-archived:
      depends_on: [code-cleanup]

    doc-architect:
      depends_on: [code-cleanup, docs-archived]

    # ── Deploy (push to Managed Runtime after all code changes) ────────
    push-app:
      depends_on: [doc-architect]

    poll-app-ci:
      depends_on: [push-app]
      poll_target: push-app

    publish-pr:
      depends_on: [poll-app-ci]

    # ── Triage ─────────────────────────────────────────────────────────
    triage-storefront:
      _node: triage-node
      depends_on: []
      triage_profile: storefront

  # ── Unfixable Signals ──────────────────────────────────────────────
  unfixable_signals:
    - "unauthorized_client"
    - "invalid_client"
    - "account_suspended"
    - "organization not found"
    - "slas client not found"

  # ── Feature-scoped halt on repeated identical error ────────────────
  # Stops the feature run when the same `errorSignature` recurs across any
  # combination of nodes. Catches the "same error rotating through different
  # nodes forever" loop that per-item budgets cannot detect. Opt-in; disable
  # by removing this block or setting `enabled: false`.
  halt_on_identical:
    enabled: true
    threshold: 3
    excluded_keys:
      - push-app
      - poll-app-ci
      - publish-pr

  # ── Error-signature fingerprinter: Playwright volatile tokens ──────
  # Stripped in addition to the built-in stack-agnostic defaults before
  # hashing. Prevents rotating run totals, progress counters, durations,
  # and per-run test-result paths from producing a different signature
  # every cycle (which would defeat halt_on_identical).
  error_signature:
    volatile_patterns:
      - { pattern: '\d+ passed(?:, \d+ failed)?(?:, \d+ total)?', replacement: "<PW_TOTALS>" }
      - { pattern: 'Running \d+ tests? using \d+ workers?',      replacement: "<PW_RUN>" }
      - { pattern: '\[\d+/\d+\]',                                 replacement: "<PW_PROGRESS>" }
      - { pattern: '\(\d+(?:\.\d+)?\s*(?:ms|m|s)\)',              replacement: "<DUR>" }
      - { pattern: 'Timeout \d+ms exceeded',                      replacement: "Timeout <MS>ms exceeded" }
      - { pattern: 'test-results/[^\s)"''`]+',                    replacement: "<TEST_RESULT>" }
      - { pattern: 'attachment #\d+',                             replacement: "attachment #<N>" }
      - { pattern: '\d+ did not run',                             replacement: "<PW_NOTRUN>" }

  # ── Triage Profiles ─────────────────────────────────────────────────
  triage:
    storefront:
      packs: [pwa-kit-storefront]
      classifier: llm-only
      llm_fallback: true
      max_reroutes: 5
      routing:
        frontend:
          description: "UI rendering, Chakra components, commerce-sdk-react hook errors, config, Playwright failures"
        cicd:
          description: "GitHub Actions workflow file errors, deploy pipeline config"
        deployment-stale:
          description: "Stale deployment requiring re-push"
        test-code:
          description: "The test itself is wrong (bad locator, race condition, contradicts spec)"
        test-code-from-dev:
          description: "Test code is broken, but written by the upstream dev agent, not QA"
        environment:
          description: "Transient auth/credential glitch, SLAS token failure, not a code bug"
          retries: 2
        ssr-hydration:
          description: "SSR hydration mismatch, server-render crash, React hydration errors — route to the live-browser debugger for MCP-driven investigation"
          route_to: storefront-debug
        no-op-dev:
          description: "Dev agent reported completion without committing any files in its attribution dirs. Re-dispatch with explicit must-commit directive."
          route_to: storefront-dev
          retries: 1
        blocked:
          description: "Unfixable without human intervention (permissions, SFCC access)"
