# workflows.yml — Declarative DAG for the commerce-storefront pipeline.
#
# Structure:
#   <workflow-name>: Named workflow DAGs. Each is self-contained.
#
# Node definitions live in apm.yml → nodes: (the pool).
# Compiler merges pool defaults → workflow node (workflow fields win).
# Graph-only fields (depends_on, on_failure, poll_target, triage_profile)
# are NEVER inherited from the pool.
#
# 11-node DAG (no infra wave — Managed Runtime is SaaS, no barrier — depends_on handles fan-in),
# no backend nodes (SCAPI is SaaS). Backend extension nodes can be
# added later without kernel changes.
#
# PWA Kit runs locally via `npm start`, so Playwright E2E tests
# execute BEFORE code push — the deploy phase is the final step.

# ═══════════════════════════════════════════════════════════════════════
# Workflow: storefront
# ═══════════════════════════════════════════════════════════════════════
storefront:
  description: "Storefront pipeline: dev → unit test → E2E → deploy → finalize"

  default_triage: triage-storefront

  nodes:
    # ── Wave 0: Scaffolding (pipeline-agnostic kernel → pipeline-specific nodes) ─
    # `create-branch` materializes feature/<slug>; `stage-spec` copies the
    # user-supplied spec (--spec-file) into `_kickoff/spec.md` so every
    # `consumes_kickoff: [spec]` node below receives it via the
    # materialize-inputs middleware.
    create-branch:
      depends_on: []

    stage-spec:
      depends_on: [create-branch]

    # ── Acceptance contract compilation ───────────────────────────────
    # Runs first. Produces the machine-checkable ACCEPTANCE.yml that
    # storefront-dev, e2e-author, validate-acceptance (Phase B), and
    # qa-adversary (Phase B.2) all score against. Separating contract
    # authoring from implementation prevents the dev agent from rewriting
    # its own acceptance criteria during redevelopment cycles.
    spec-compiler:
      depends_on: [stage-spec]
      consumes_kickoff: [spec]
      produces_artifacts: [acceptance]
      # Spec-compiler self-heals schema violations via on_failure.schema-violation=$SELF,
      # so its reroute surface picks up the triage handoff on retries.
      consumes_reroute:
        - { kind: triage-handoff, required: true }
      # Bounded self-repair loop for schema violations. The
      # acceptance-integrity middleware produces canonical errors like
      # `[acceptance:…] schema violation: required_flows.N.steps: …` which
      # the L0 classifier matches (classifyRawError → schema-violation).
      # The failing ACCEPTANCE.yml is left on disk so the agent can patch
      # the specific field rather than regenerate. halt_on_identical stops
      # the ping-pong when the agent can't fix itself; max_item_failures
      # caps the total attempts.
      circuit_breaker:
        max_item_failures: 3
        halt_on_identical: true
      on_failure:
        triage: triage-storefront
        routes:
          # Route structurally-invalid ACCEPTANCE.yml back to spec-compiler
          # itself for a repair pass. Bounded by circuit_breaker above.
          schema-violation: spec-compiler
          # Any other classification for a spec-compiler failure is
          # unrecoverable — blocked means human review + salvage.
          blocked: null

    # ── Pre-feature baseline ──────────────────────────────────────────
    # Captures console/network/uncaught errors on the pages and modals
    # the feature will touch, BEFORE any code is written. The triage
    # engine consumes the resulting `_BASELINE.json` as a noise filter
    # so pre-existing platform errors never misclassify as feature
    # defects. Advisory: failure never blocks the pipeline.
    baseline-analyzer:
      depends_on: [spec-compiler]
      consumes_kickoff: [spec]
      consumes_artifacts:
        - { from: spec-compiler, kind: acceptance }
      produces_artifacts: [baseline]
      consumes_reroute:
        - { kind: triage-handoff, required: true }
      circuit_breaker:
        max_item_failures: 2
        halt_on_identical: true
      on_failure:
        triage: triage-storefront
        extends: base
        routes:
          # Transient dev-server / Playwright MCP glitches — retry once.
          # (environment: $SELF + blocked: null inherited from `base`.)
          # Anything else: degrade gracefully. Downstream nodes proceed
          # without a baseline — triage.filterNoise becomes a no-op.

    # ── Development ────────────────────────────────────────────────────
    storefront-dev:
      depends_on: [spec-compiler, baseline-analyzer]
      consumes_kickoff: [spec]
      consumes_artifacts:
        - { from: spec-compiler, kind: acceptance }
        - { from: baseline-analyzer, kind: baseline, required: false }
      # Session A Item 9 — the dev agent self-reports which acceptance
      # flows are live vs feature-flag-off / partial / skipped, so
      # qa-adversary can skip non-live flows instead of raising false
      # `required flow not exercised` violations (which otherwise triage
      # back as "not implemented" and loop forever).
      produces_artifacts: [implementation-status]
      # Primary reroute target for frontend/test-code/environment failures
      # surfaced by storefront-unit-test. Kernel injects the triage handoff
      # only on `trigger=triage-reroute` runs.
      consumes_reroute:
        - { kind: triage-handoff, required: true }

    # ── Runtime-defect debugger ───────────────────────────────────────
    # Sits inline between storefront-dev and storefront-unit-test. On the
    # happy path (no triage reroute) the node auto-skips via
    # `auto_skip_unless_triage_reroute`. When triage reroutes a runtime
    # failure (frontend / ssr-hydration / browser-runtime-error /
    # test-code-from-dev) onto this node, it reproduces the failure via
    # the Playwright MCP, patches the minimum diff, and lets the DAG
    # re-run storefront-unit-test → e2e-author → e2e-runner → qa-adversary.
    storefront-debug:
      depends_on: [storefront-dev]
      consumes_kickoff: [spec]
      consumes_artifacts:
        - { from: spec-compiler, kind: acceptance }
        - { from: baseline-analyzer, kind: baseline, required: false }
      produces_artifacts: [debug-notes]
      # storefront-debug auto-skips on the happy path and only runs when
      # triage reroutes a runtime failure (frontend/ssr-hydration/
      # browser-runtime-error/test-code-from-dev). The handoff is always
      # required when this node is activated.
      consumes_reroute:
        - { kind: triage-handoff, required: true }
      on_failure:
        triage: triage-storefront
        extends: base
        routes:
          # Debug couldn't fix the runtime bug — retry itself (bounded by
          # circuit_breaker.max_item_failures in apm.yml).
          frontend: "$SELF"
          ssr-hydration: "$SELF"
          browser-runtime-error: "$SELF"
          test-code-from-dev: "$SELF"
          # Debug concluded the Playwright spec itself is the defect —
          # hand off to the SDET.
          test-code: e2e-author
          # `base` contributes environment: $SELF and blocked: null.

    storefront-unit-test:
      depends_on: [storefront-debug]
      consumes_artifacts:
        - { from: spec-compiler, kind: acceptance }
      consumes_reroute:
        - { kind: triage-handoff, required: true }
      on_failure:
        triage: triage-storefront
        extends: base
        routes:
          # Unit-test failures indicate a shallow impl bug that does not
          # require live-browser investigation — keep routing to dev.
          frontend: storefront-dev
          test-code: storefront-dev
          # `base` contributes environment: $SELF and blocked: null.

    # ── Validation (Author/Runner — SDET writes, native exec runs) ────
    e2e-author:
      depends_on: [storefront-unit-test]
      consumes_artifacts:
        - { from: spec-compiler, kind: acceptance }
      # SDET is rerouted for `test-code` failures surfaced by e2e-runner,
      # qa-adversary, or storefront-debug.
      consumes_reroute:
        - { kind: triage-handoff, required: true }

    e2e-runner:
      depends_on: [e2e-author]
      consumes_artifacts:
        - { from: spec-compiler, kind: acceptance }
      produces_artifacts: [playwright-report]
      on_failure:
        triage: triage-storefront
        # `runtime-to-debug` ships frontend/ssr-hydration/browser-runtime-error
        # → storefront-debug, plus the `base` inheritance for environment/blocked.
        extends: runtime-to-debug
        routes:
          # Pure test bugs (bad locator, race condition) remain the SDET's
          # responsibility.
          test-code: e2e-author
          # Test code the dev agent produced (e.g. a storefront helper that
          # a spec imports) — debug investigates; if it's genuinely a test
          # problem debug's own on_failure.test-code reroutes to e2e-author.
          test-code-from-dev: storefront-debug

    # ── Adversarial QA pass (Phase B.2) ───────────────────────────────
    # Attempts to falsify the feature against the acceptance contract.
    # Writes `<slug>_QA-REPORT.json`; any violation fails this node and
    # routes runtime defects to the debug agent for redevelopment.
    qa-adversary:
      depends_on: [e2e-runner]
      consumes_artifacts:
        - { from: spec-compiler, kind: acceptance }
        - { from: e2e-runner, kind: playwright-report, required: false }
        # Session A Item 9 — optional so qa-adversary still runs if
        # storefront-dev emitted no implementation-status (legacy runs,
        # fresh-slate reverts). When present, the agent prompt requires
        # probes to skip flows whose status is not "live".
        - { from: storefront-dev, kind: implementation-status, required: false }
      produces_artifacts: [qa-report]
      consumes_reroute:
        - { kind: triage-handoff, required: true }
      on_failure:
        triage: triage-storefront
        # `runtime-to-debug` covers frontend/ssr-hydration/browser-runtime-error
        # → storefront-debug + base (environment:$SELF, blocked:null).
        extends: runtime-to-debug
        routes:
          # The QA probes themselves can be wrong (e.g. impossible flow).
          test-code: qa-adversary

    create-draft-pr:
      depends_on: [storefront-unit-test, e2e-author, qa-adversary]
      consumes_artifacts:
        - { from: spec-compiler, kind: acceptance }
        - { from: qa-adversary, kind: qa-report, required: false }
      consumes_reroute:
        - { kind: triage-handoff, required: true }

    # ── Finalize ───────────────────────────────────────────────────────
    code-cleanup:
      depends_on: [e2e-runner, qa-adversary, create-draft-pr]
      consumes_reroute:
        - { kind: triage-handoff, required: true }

    docs-archived:
      depends_on: [code-cleanup]
      consumes_kickoff: [spec]
      consumes_artifacts:
        - { from: spec-compiler, kind: acceptance }
      produces_artifacts: [change-manifest]
      consumes_reroute:
        - { kind: triage-handoff, required: true }

    doc-architect:
      depends_on: [code-cleanup, docs-archived]
      consumes_kickoff: [spec]
      consumes_artifacts:
        - { from: docs-archived, kind: change-manifest, required: false }
      consumes_reroute:
        - { kind: triage-handoff, required: true }

    # ── Deploy (push to Managed Runtime after all code changes) ────────
    push-app:
      depends_on: [doc-architect]

    poll-app-ci:
      depends_on: [push-app]
      poll_target: push-app

    publish-pr:
      depends_on: [poll-app-ci]
      consumes_artifacts:
        - { from: docs-archived, kind: change-manifest, required: false }

    # ── Triage ────────────────────────────────────────────────
    triage-storefront:
      _node: triage-node
      depends_on: []
      triage_profile: storefront
      # Triage classifies failures and writes a triage-handoff artifact that
      # the rerouted target node consumes via `consumes_reroute`.
      produces_artifacts: [triage-handoff]

  # ── Unfixable Signals ──────────────────────────────────────────────
  unfixable_signals:
    - "unauthorized_client"
    - "invalid_client"
    - "account_suspended"
    - "organization not found"
    - "slas client not found"

  # ── Feature-scoped halt on repeated identical error ────────────────
  # Stops the feature run when the same `errorSignature` recurs across any
  # combination of nodes. Catches the "same error rotating through different
  # nodes forever" loop that per-item budgets cannot detect. Opt-in; disable
  # by removing this block or setting `enabled: false`.
  halt_on_identical:
    enabled: true
    threshold: 3
    excluded_keys:
      - push-app
      - poll-app-ci
      - publish-pr

  # ── Error-signature fingerprinter: Playwright volatile tokens ──────
  # Stripped in addition to the built-in stack-agnostic defaults before
  # hashing. Prevents rotating run totals, progress counters, durations,
  # and per-run test-result paths from producing a different signature
  # every cycle (which would defeat halt_on_identical).
  error_signature:
    volatile_patterns:
      - { pattern: '\d+ passed(?:, \d+ failed)?(?:, \d+ total)?', replacement: "<PW_TOTALS>" }
      - { pattern: 'Running \d+ tests? using \d+ workers?',      replacement: "<PW_RUN>" }
      - { pattern: '\[\d+/\d+\]',                                 replacement: "<PW_PROGRESS>" }
      - { pattern: '\(\d+(?:\.\d+)?\s*(?:ms|m|s)\)',              replacement: "<DUR>" }
      - { pattern: 'Timeout \d+ms exceeded',                      replacement: "Timeout <MS>ms exceeded" }
      - { pattern: 'test-results/[^\s)"''`]+',                    replacement: "<TEST_RESULT>" }
      - { pattern: 'attachment #\d+',                             replacement: "attachment #<N>" }
      - { pattern: '\d+ did not run',                             replacement: "<PW_NOTRUN>" }

  # ── Triage Profiles ─────────────────────────────────────────────────
  triage:
    storefront:
      packs: [pwa-kit-storefront]
      classifier: llm-only
      llm_fallback: true
      max_reroutes: 5
      routing:
        frontend:
          description: "UI rendering, Chakra components, commerce-sdk-react hook errors, config, Playwright failures"
        browser-runtime-error:
          description: "Uncaught JS exception in the browser context — always an impl defect. Emitted by the L0 built-in pattern on Playwright uncaughtErrors."
        schema-violation:
          description: "spec-compiler produced an invalid ACCEPTANCE.yml (Zod schema violation, YAML parse error, missing file). Route back to spec-compiler for bounded self-repair."
        cicd:
          description: "GitHub Actions workflow file errors, deploy pipeline config"
        deployment-stale:
          description: "Stale deployment requiring re-push"
        test-code:
          description: "The test itself is wrong (bad locator, race condition, contradicts spec)"
        test-code-from-dev:
          description: "Test code is broken, but written by the upstream dev agent, not QA"
        environment:
          description: "Transient auth/credential glitch, SLAS token failure, not a code bug"
          retries: 2
        ssr-hydration:
          description: "SSR hydration mismatch, server-render crash, React hydration errors — route to the live-browser debugger for MCP-driven investigation"
          route_to: storefront-debug
        no-op-dev:
          description: "Dev agent reported completion without committing any files in its attribution dirs. Re-dispatch with explicit must-commit directive."
          route_to: storefront-dev
          retries: 1
        blocked:
          description: "Unfixable without human intervention (permissions, SFCC access)"
      # 🆁3 proof-of-concept — declarative JSONPath predicate. Narrows
      # an uncaught browser exception whose message mentions Managed
      # Runtime / SSR internals to `ssr-hydration` instead of the
      # generic `browser-runtime-error` domain. Evaluated BEFORE the
      # built-in uncaughtErrors.nonEmpty rule because profile patterns
      # are order-preserving and declared patterns are appended after
      # the built-ins by default — so we opt out of built-ins here to
      # demonstrate the extensibility contract. Built-ins remain
      # effective via the raw-regex spec-schema-violation arm, which
      # we re-declare in `patterns:` to preserve coverage.
      #
      # This is a proof point, not a product feature; the `value:`
      # regex is intentionally conservative and needs tightening once
      # a real MRT stack-trace corpus is collected.
      builtin_patterns: false
      patterns:
        - match_kind: json-path
          format: playwright-json
          path: "$.uncaughtErrors[*].message"
          op: regex
          value: "(Managed Runtime|mobify|ssr\\.js|hydrateRoot)"
          domain: ssr-hydration
          reason_template: "Uncaught Managed-Runtime/SSR error in \"${inTest}\": ${firstMsg}"
          capture:
            firstMsg: "$.uncaughtErrors[0].message"
            inTest: "$.uncaughtErrors[0].inTest"
        # Generic browser uncaught — parity with the bundled built-in,
        # re-declared because `builtin_patterns: false` above drops it.
        - match_kind: structured-field
          format: playwright-json
          when: uncaughtErrors.nonEmpty
          domain: browser-runtime-error
          reason_template: 'Uncaught browser exception in "${inTest}": ${errFirstLine}'
        # spec-compiler schema violations — parity with built-in arm.
        - match_kind: raw-regex
          pattern: "(produced an invalid acceptance contract at |reported success but did not produce .*acceptance\\.yml|\\[acceptance:[^\\]]+\\]\\s*(schema violation|YAML parse error|file not readable))"
          domain: schema-violation
          reason_template: "spec-compiler produced an invalid ACCEPTANCE contract. Repair the schema violation and re-emit: ${errFirstLine}"

  # ── Route Profiles (Session B Item 4) ───────────────────────────────
  # Named, reusable `on_failure.routes` fragments. Nodes inherit via
  # `on_failure.extends: <name>` and override per-node. The APM compiler
  # flattens single-level `extends` on each profile and detects cycles.
  # Merge order at node scope: routeProfiles[extends] → default_on_failure
  # → node on_failure (node wins).
  # Profiles chain max depth: 1 (A extends B; B must not extend). Deeper
  # chains and cycles fail at compile time with ApmCompileError (🆁4).
  routeProfiles:
    # Shared baseline: transient env glitches retry the failing node;
    # unfixable conditions halt gracefully.
    base:
      routes:
        environment: "$SELF"
        blocked: null

    # Runtime-defect fan-in to the live-browser debugger. Used by all
    # test-phase nodes that can produce a frontend / SSR / uncaught-JS
    # failure and should redirect it to storefront-debug for MCP-driven
    # reproduction rather than cycling storefront-dev.
    runtime-to-debug:
      extends: base
      routes:
        frontend: storefront-debug
        ssr-hydration: storefront-debug
        browser-runtime-error: storefront-debug
