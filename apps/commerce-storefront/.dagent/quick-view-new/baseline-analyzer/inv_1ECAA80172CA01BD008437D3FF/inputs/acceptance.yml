forbidden_console_patterns:
- useProduct.*failed
- addItemToBasket.*failed
forbidden_network_failures:
- GET /mobify/proxy/api/.*/products/.*
- POST /mobify/proxy/api/.*/baskets
- POST /mobify/proxy/api/.*/baskets/.*/items
base_template_reuse:
- symbol: ProductView
  package: '@salesforce/retail-react-app'
  rationale: Core product detail body (swatches, quantity, gallery, price, add-to-bag); must be reused with showDeliveryOptions={false}
    rather than cloned.
- symbol: useProductViewModal
  package: '@salesforce/retail-react-app'
  rationale: Orchestrates useProduct + useVariant merge with initial tile data and handles error toasts; must be reused to
    avoid re-implementing detail fetch orchestration.
- symbol: AddToCartModal
  package: '@salesforce/retail-react-app'
  rationale: Global add-to-cart confirmation modal already mounted at shell level; must be consumed via useAddToCartModalContext
    rather than authoring a bespoke confirmation.
- symbol: useAddToCartModalContext
  package: '@salesforce/retail-react-app'
  rationale: Hook to trigger the global AddToCartModal after successful basket mutation; must be called with {product, itemsAdded,
    selectedQuantity} on add-to-bag success.
- symbol: useCurrentBasket
  package: '@salesforce/retail-react-app'
  rationale: Source of the active basket id for add-to-bag mutations; must be reused rather than manually tracking basket
    state.
- symbol: ProductTile
  package: '@salesforce/retail-react-app'
  rationale: Base tile component that the Quick View trigger overlay extends; the override wraps base ProductTile and adds
    a sibling trigger button.
