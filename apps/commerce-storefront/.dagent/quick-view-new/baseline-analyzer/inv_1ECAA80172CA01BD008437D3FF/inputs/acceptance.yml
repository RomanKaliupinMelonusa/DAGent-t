feature: quick-view-new
summary: Adds a Quick View button to PLP product tiles that opens a modal with full ProductView (swatches, quantity, add-to-bag)
  without navigating to PDP. On successful add-to-bag the modal closes and the global AddToCartModal confirmation appears.
test_fixtures:
- id: plp-multi-color
  url: /category/mens-accessories
  base_sha: 6a7897f03c60f34cc83fb0ced0323d371d0712f3
  asserted_at: '2026-05-01T01:47:44Z'
  asserts:
  - kind: http_status
    value: 200
    comparator: eq
  - kind: tile_count_min
    value: 4
    comparator: gte
  - kind: first_tile_swatch_count
    value: 2
    comparator: gte
- id: plp-add-to-bag
  url: /category/womens-clothing-dresses
  base_sha: 6a7897f03c60f34cc83fb0ced0323d371d0712f3
  asserted_at: '2026-05-01T01:47:44Z'
  asserts:
  - kind: http_status
    value: 200
    comparator: eq
  - kind: tile_count_min
    value: 4
    comparator: gte
  - kind: in_stock
    value: true
    comparator: eq
required_dom:
- testid: quick-view-trigger
  description: Quick View button overlaid on each PLP product tile image area (one per tile)
  cardinality: many
- testid: quick-view-modal
  description: The Quick View modal container (ModalContent)
  cardinality: one
- testid: quick-view-modal-error
  description: ErrorBoundary fallback rendered inside the modal body on crash
  cardinality: one
- testid: quick-view-add-to-cart-btn
  description: Add to Bag button inside the Quick View modal wrapping ProductView add action
  cardinality: one
  requires_non_empty_text: true
- testid: quick-view-view-full-details-link
  description: View Full Details link inside the modal navigating to the PDP
  cardinality: one
  requires_non_empty_text: true
- testid: product-view
  description: Base ProductView component rendered inside the Quick View modal body
  cardinality: one
- testid: add-to-cart-modal
  description: Global AddToCartModal confirmation that appears after successful add-to-bag
  cardinality: one
