# =============================================================================
# Temporal Integration Tests
# =============================================================================
# Spins up the local Temporal docker-compose stack and runs the Temporal-
# specific test suite from tools/autonomous-factory.
#
# Trigger is paths-filtered to keep CI minutes bounded — only fires when
# code under src/temporal/** or infra/temporal/** changes, plus the workflow
# file itself.
# =============================================================================

name: Temporal Integration

concurrency:
  group: temporal-it-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tools/autonomous-factory/src/temporal/**'
      - 'tools/autonomous-factory/package.json'
      - 'tools/autonomous-factory/package-lock.json'
      - 'tools/autonomous-factory/eslint.config.js'
      - 'tools/autonomous-factory/vitest.config.ts'
      - 'infra/temporal/**'
      - '.github/workflows/temporal-it.yml'

permissions:
  contents: read

jobs:
  integration:
    name: Temporal — Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        # Root `npm ci` installs every workspace's deps (including
        # tools/autonomous-factory) and runs the postinstall ajv shim.
        # No second install step needed — would only break lockfile.
        run: npm ci

      - name: Start Temporal cluster
        run: docker compose -f infra/temporal/docker-compose.yml up -d

      - name: Wait for Temporal frontend
        run: |
          for i in {1..60}; do
            if nc -z localhost 7233; then
              echo "Temporal frontend reachable"
              exit 0
            fi
            sleep 2
          done
          echo "Temporal frontend did not become reachable in time"
          docker compose -f infra/temporal/docker-compose.yml logs --tail=200
          exit 1

      - name: Lint (Temporal scope)
        working-directory: tools/autonomous-factory
        run: npm run lint

      - name: Lint regression — workflow determinism rule must fire
        working-directory: tools/autonomous-factory
        run: npm run lint:test

      - name: Cutover guardrail — do-not-delete allowlist
        working-directory: tools/autonomous-factory
        run: npm run check:do-not-delete

      - name: Temporal integration tests
        working-directory: tools/autonomous-factory
        env:
          TEMPORAL_ADDRESS: localhost:7233
        run: npm run temporal:test:integration

      - name: PR-equivalence harness (Session 5 G3)
        working-directory: tools/autonomous-factory
        run: npm run test:pr-equivalence

      - name: Dump Temporal logs on failure
        if: failure()
        run: docker compose -f infra/temporal/docker-compose.yml logs --tail=500

      - name: Tear down Temporal cluster
        if: always()
        run: docker compose -f infra/temporal/docker-compose.yml down -v

  worker-image:
    # =====================================================================
    # Session 5 G4 — Build Dockerfile.worker and verify the container
    # boots against the Temporal dev cluster in CI. Asserts the worker
    # connects to the task queue and stays up for ≥10 seconds without
    # crashing. Closes the soak-window prerequisite that the runtime
    # image is reproducible end-to-end.
    # =====================================================================
    name: Temporal — Worker image build & boot
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Temporal cluster
        run: docker compose -f infra/temporal/docker-compose.yml up -d

      - name: Wait for Temporal frontend
        run: |
          for i in {1..60}; do
            if nc -z localhost 7233; then
              echo "Temporal frontend reachable"
              exit 0
            fi
            sleep 2
          done
          echo "Temporal frontend did not become reachable in time"
          docker compose -f infra/temporal/docker-compose.yml logs --tail=200
          exit 1

      - name: Build worker image
        run: |
          docker build \
            -f tools/autonomous-factory/Dockerfile.worker \
            -t dagent/worker:ci .

      - name: Boot worker against Temporal dev cluster
        # The container must:
        #   1. Connect to Temporal within 30s.
        #   2. Log "[worker] connected to ..." (readiness signal).
        #   3. Stay alive for ≥10s without crashing.
        # WORKER_DISABLE_LLM=1 keeps the boot test billing-safe.
        run: |
          set -euo pipefail
          # The Temporal docker-compose stack runs on the host network
          # via mapped ports, so use --network=host inside Linux runners.
          CONTAINER_ID=$(docker run -d --network=host \
            -e TEMPORAL_ADDRESS=localhost:7233 \
            -e TEMPORAL_TASK_QUEUE=ci-worker-image-${{ github.run_id }} \
            -e TEMPORAL_NAMESPACE=default \
            -e WORKER_DISABLE_LLM=1 \
            dagent/worker:ci)
          echo "container=$CONTAINER_ID"

          # Poll the container logs for the readiness line.
          for i in {1..30}; do
            if docker logs "$CONTAINER_ID" 2>&1 | grep -q "\[worker\] connected to"; then
              echo "Worker reported readiness."
              break
            fi
            if ! docker ps --no-trunc --quiet --filter id="$CONTAINER_ID" | grep -q "$CONTAINER_ID"; then
              echo "Worker container exited before readiness:"
              docker logs "$CONTAINER_ID" --tail=200
              exit 1
            fi
            sleep 1
          done

          # Hold for 10 seconds and assert it's still alive.
          sleep 10
          if ! docker ps --no-trunc --quiet --filter id="$CONTAINER_ID" | grep -q "$CONTAINER_ID"; then
            echo "Worker container exited during the 10s hold:"
            docker logs "$CONTAINER_ID" --tail=200
            exit 1
          fi

          echo "Worker boot test PASSED."
          docker logs "$CONTAINER_ID" --tail=80
          docker stop "$CONTAINER_ID" >/dev/null

      - name: Dump Temporal logs on failure
        if: failure()
        run: docker compose -f infra/temporal/docker-compose.yml logs --tail=500

      - name: Tear down Temporal cluster
        if: always()
        run: docker compose -f infra/temporal/docker-compose.yml down -v
