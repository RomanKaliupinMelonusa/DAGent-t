# =============================================================================
# Infrastructure Plan — Terraform Plan Only (OIDC)
# =============================================================================
# Single-job workflow: runs `terraform plan` and uploads the plan output as
# artifacts. The orchestrator posts the plan to the Draft PR after polling.
# Apply is handled exclusively by elevated-infra-deploy.yml via ChatOps
# (`/dagent approve-infra` or `/dagent apply-elevated`).
#
# Uses OIDC federated credentials — zero stored secrets for Azure auth.
#
# Prerequisites:
#   1. GitHub Secrets: AZURE_CICD_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
# =============================================================================

name: Deploy Infrastructure

concurrency:
  group: deploy-infra-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'apps/*/infra/**'
      - '.github/workflows/deploy-infra.yml'
  pull_request:
    paths:
      - 'apps/*/infra/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:
    inputs:
      app-path:
        description: 'App directory relative to repo root'
        required: true
        type: string
        default: 'apps/sample-app'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  APP_PATH: ${{ inputs.app-path || 'apps/sample-app' }}

jobs:
  # ---------------------------------------------------------------------------
  # Terraform Plan — runs on every trigger
  # ---------------------------------------------------------------------------
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CICD_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Init
        working-directory: ${{ env.APP_PATH }}/infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CICD_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.APP_PATH }}/infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CICD_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_apim_publisher_email: ${{ secrets.APIM_PUBLISHER_EMAIL }}
          TF_VAR_frontend_url: ${{ secrets.FRONTEND_URL }}
          TF_VAR_auth_mode: ${{ secrets.AUTH_MODE }}
          TF_VAR_demo_credentials: ${{ secrets.DEMO_CREDENTIALS }}
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Upload plan binary artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.APP_PATH }}/infra/tfplan
          retention-days: 7

      - name: Upload plan output artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-output
          path: ${{ env.APP_PATH }}/infra/plan-output.txt
          retention-days: 7

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('${{ env.APP_PATH }}/infra/plan-output.txt', 'utf8');
            const planResult = '${{ steps.plan.outcome }}';

            const maxLen = 60000;
            const truncated = output.length > maxLen
              ? output.substring(0, maxLen) + '\n\n... (truncated)'
              : output;

            const body = `### Terraform Plan — \`${planResult}\`

            <details><summary>Show plan output</summary>

            \`\`\`
            ${truncated}
            \`\`\`

            </details>

            *Pushed by @${{ github.actor }} · Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
