# =============================================================================
# Elevated Infrastructure Deploy — ChatOps Human-in-the-Loop
# =============================================================================
# Runs `terraform apply` with elevated privileges when a human comments
# `/dagent apply-elevated` on a Pull Request.
#
# Usage:
#   /dagent apply-elevated                              (full apply)
#   /dagent apply-elevated -target=azurerm_resource.x   (targeted apply)
#   /dagent hold                                        (pause pipeline — see dagent-chatops.yml)
#   /dagent resume                                      (restart pipeline — see dagent-chatops.yml)
#
# Security model:
#   1. OIDC federation scoped to `secops-elevated` GitHub Environment ONLY
#   2. Environment requires manual reviewer approval before OIDC token is issued
#   3. Elevated SP has Contributor + User Access Administrator (RG-scoped)
#   4. Shared remote Terraform state (azurerm backend)
#   5. Human resumes pipeline locally after elevated apply completes
#
# Prerequisites:
#   1. GitHub Environment "secops-elevated" with required reviewers
#   2. GitHub Secrets: AZURE_ELEVATED_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   3. GitHub Secret: COPILOT_PAT (for git push to feature branch)
# =============================================================================

name: Elevated Infrastructure Deploy

concurrency:
  group: elevated-infra-${{ github.event.issue.number }}
  cancel-in-progress: false

on:
  issue_comment:
    types: [created]

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  APP_PATH: apps/sample-app
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true

jobs:
  elevated-apply:
    name: Elevated Terraform Apply
    if: >-
      github.event.issue.pull_request
      && (startsWith(github.event.comment.body, '/dagent approve-infra')
          || startsWith(github.event.comment.body, '/dagent apply-elevated'))
    runs-on: ubuntu-latest
    environment: secops-elevated

    steps:
      - name: Add reaction to comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=rocket

      - name: Parse command and get PR metadata
        id: pr-meta
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          PR_BRANCH=$(gh pr view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json headRefName -q '.headRefName')
          echo "branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"

          SLUG=$(echo "$PR_BRANCH" | sed 's|^feature/||')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

          # Parse optional -target flags from comment body (first line only)
          FIRST_LINE=$(echo "$COMMENT_BODY" | head -1)
          TARGETS=$(echo "$FIRST_LINE" | grep -oE '\-target=[^ ]+' || true)
          if [ -n "$TARGETS" ]; then
            TF_TARGET_ARGS=$(echo "$TARGETS" | tr '\n' ' ')
            echo "tf_targets=$TF_TARGET_ARGS" >> "$GITHUB_OUTPUT"
            echo "Parsed terraform targets: $TF_TARGET_ARGS"
          else
            echo "tf_targets=" >> "$GITHUB_OUTPUT"
            echo "No targets specified — full apply"
          fi

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-meta.outputs.branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Login to Azure (Elevated OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_ELEVATED_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Init
        working-directory: ${{ env.APP_PATH }}/infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_ELEVATED_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init

      - name: Terraform Apply
        id: apply
        working-directory: ${{ env.APP_PATH }}/infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_ELEVATED_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_apim_publisher_email: ${{ secrets.APIM_PUBLISHER_EMAIL }}
          TF_VAR_frontend_url: ${{ secrets.FRONTEND_URL }}
          TF_VAR_auth_mode: ${{ secrets.AUTH_MODE }}
          TF_VAR_demo_credentials: ${{ secrets.DEMO_CREDENTIALS }}
        run: |
          set -o pipefail
          terraform apply -auto-approve -no-color ${{ steps.pr-meta.outputs.tf_targets }} 2>&1 | tee apply-output.txt
        continue-on-error: true

      - name: Post success comment
        if: steps.apply.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "$(cat <<'EOF'
          ✅ **Elevated infrastructure applied successfully.**

          Triggered by @${{ github.event.comment.user.login }} via `/dagent approve-infra`
          Infrastructure approval gate completed.

          > 💻 **Action Required:** Please pull the latest state and resume the pipeline locally to begin the Application Wave:
          > ```bash
          > git pull origin feature/${{ steps.pr-meta.outputs.slug }}
          > npm run agent:run -- --app apps/sample-app ${{ steps.pr-meta.outputs.slug }}
          > ```
          EOF
          )"

      - name: Resume pipeline
        if: steps.apply.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          APP_ROOT: ${{ env.APP_PATH }}
        run: |
          # 1. Update the state file locally
          npm run pipeline:complete ${{ steps.pr-meta.outputs.slug }} await-infra-approval || echo "⚠️ pipeline:complete skipped"
          npm run pipeline:resume ${{ steps.pr-meta.outputs.slug }} || echo "⚠️ pipeline:resume skipped"

          # 2. Commit and push the updated state back to the feature branch
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.APP_PATH }}/in-progress/
          git commit -m "chore(pipeline): complete await-infra-approval gate [skip ci]" || echo "No state changes to commit"
          git push origin ${{ steps.pr-meta.outputs.branch }}

          # Note: We deliberately DO NOT trigger agentic-feature.yml here.
          # The human will resume the orchestrator locally.

      - name: Post failure comment
        if: steps.apply.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OUTPUT=$(head -c 60000 ${{ env.APP_PATH }}/infra/apply-output.txt)
          gh pr comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "$(cat <<EOF
          ❌ **Elevated infrastructure apply failed.**

          Triggered by @${{ github.event.comment.user.login }} via \`/dagent apply-elevated\`
          The pipeline state has been updated to trigger an infrastructure recovery cycle.

          > 💻 **Action Required:** Please pull the latest state and resume the pipeline locally. The \`@infra-architect\` agent will wake up to diagnose and fix the Terraform code:
          > \`\`\`bash
          > git pull origin feature/${{ steps.pr-meta.outputs.slug }}
          > npm run agent:run -- --app apps/sample-app ${{ steps.pr-meta.outputs.slug }}
          > \`\`\`

          <details><summary>Terraform output</summary>

          \`\`\`
          $OUTPUT
          \`\`\`

          </details>
          EOF
          )"

      - name: Recover pipeline
        if: steps.apply.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          APP_ROOT: ${{ env.APP_PATH }}
        run: |
          # 1. Update the state file locally with failure recovery
          ERROR_SUMMARY=$(grep -E "^Error:" ${{ env.APP_PATH }}/infra/apply-output.txt | head -5 | tr '\n' ' ')
          npm run pipeline:recover-elevated ${{ steps.pr-meta.outputs.slug }} "$ERROR_SUMMARY" || echo "⚠️ pipeline:recover-elevated skipped"

          # 2. Commit and push the updated state back to the feature branch
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.APP_PATH }}/in-progress/
          git commit -m "chore(pipeline): recover-elevated after apply failure [skip ci]" || echo "No state changes to commit"
          git push origin ${{ steps.pr-meta.outputs.branch }}

          # Note: We deliberately DO NOT trigger agentic-feature.yml here.
          # The human will resume the orchestrator locally.

      - name: Fail if apply failed
        if: steps.apply.outcome == 'failure'
        run: exit 1
