# =============================================================================
# Docs Lint — internal markdown link integrity
# =============================================================================
# Runs the lightweight internal-link checker on every PR that touches
# documentation. Catches broken cross-doc references after refactors.
# =============================================================================

name: Docs Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.md'
      - 'scripts/check-doc-links.mjs'
      - '.github/workflows/docs-lint.yml'

permissions:
  contents: read

jobs:
  links:
    name: Internal link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Run internal link check
        # Advisory while pre-existing broken links are cleaned up. Once
        # the repo reaches 0 broken links, remove `continue-on-error`
        # to make this gate enforcing.
        continue-on-error: true
        run: node scripts/check-doc-links.mjs
