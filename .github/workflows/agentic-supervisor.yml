# =============================================================================
# Agentic Supervisor — Multi-Slug Parallel Feature Pipeline
# =============================================================================
# Runs multiple feature pipelines concurrently via tools/autonomous-factory/
# src/entry/supervise.ts. Each feature executes in its own child process so
# APP_ROOT and the middleware registry stay isolated per-slug.
#
# Intake:
#   JSON file committed to the repo, matching SupervisorIntakeSchema.
#   Example: tools/autonomous-factory/intake/example.json
#     {
#       "features": [
#         { "slug": "feat-a", "app": "apps/sample-app" },
#         { "slug": "feat-b", "app": "apps/commerce-storefront" }
#       ],
#       "maxConcurrentFeatures": 2
#     }
#
# Prerequisites:
#   - Each slug listed in the intake has <app>/.dagent/<slug>_SPEC.md and
#     an initialized pipeline state (or this workflow pre-initializes them).
#   - GitHub Secret: COPILOT_PAT (PAT with copilot scope for SDK auth).
#
# Concurrency note:
#   The Copilot SDK is the real bottleneck. Default cap is 2. Override via
#   the workflow input or the DAGENT_MAX_CONCURRENT_FEATURES env var.
# =============================================================================

name: Agentic Supervisor Pipeline

concurrency:
  # One supervisor run at a time — its children already fan out in parallel.
  group: agentic-supervisor
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      intake-path:
        description: 'Path to the intake JSON (relative to repo root)'
        required: true
        type: string
      max-concurrent:
        description: 'Max concurrent features (default: 2)'
        required: false
        type: string
        default: '2'
      base-branch:
        description: 'Default base branch for all features (default: main)'
        required: false
        type: string
        default: 'main'

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  supervise:
    name: Run Supervisor
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install orchestrator dependencies
        run: cd tools/autonomous-factory && npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Authenticate Copilot SDK
        run: gh auth login --with-token <<< "${{ secrets.COPILOT_PAT }}"
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}

      - name: Run Supervisor
        run: npm run agent:supervise -- --intake "${{ inputs.intake-path }}" --max "${{ inputs.max-concurrent }}"
        env:
          POLL_MAX_RETRIES: "60"
          BASE_BRANCH: ${{ inputs.base-branch }}
          DAGENT_MAX_CONCURRENT_FEATURES: ${{ inputs.max-concurrent }}
        timeout-minutes: 240
