# =============================================================================
# CI Integration — Unit Tests & Build Checks
# =============================================================================
# Runs Jest unit tests, TypeScript type-checking, and production builds for
# backend and frontend independently of deployment workflows.
#
# Triggered on pushes to feature/** branches. Designed to be polled by
# poll-ci.sh so failures feed into the DAG's resetForDev triage loop.
#
# CONCURRENCY: cancel-in-progress: false ensures rapid sequential pushes
# from agents queue rather than cancel, so poll-ci.sh always reads a
# definitive code-execution state.
#
# NOTE: GitHub queues at most ONE pending run per concurrency group.
# When a 3rd run enters (1 running + 1 pending), the older pending
# run is cancelled. paths-ignore prevents state-only pushes from
# wasting slots and triggering this cascading cancellation.
# =============================================================================

name: CI Integration

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - 'feature/**'
    paths-ignore:
      - 'apps/*/in-progress/**'

permissions:
  contents: read

env:
  APP_PATH: apps/sample-app

jobs:
  schemas:
    name: Schemas — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared schemas
        working-directory: ${{ env.APP_PATH }}/packages/schemas
        run: npm run build

      - name: Unit tests (Jest)
        working-directory: ${{ env.APP_PATH }}/packages/schemas
        run: npx jest --verbose

  backend:
    name: Backend — Lint, Test & Build
    needs: schemas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared schemas
        working-directory: ${{ env.APP_PATH }}/packages/schemas
        run: npm run build

      - name: Type-check (tsc --noEmit)
        working-directory: ${{ env.APP_PATH }}/backend
        run: tsc --noEmit

      - name: Lint
        working-directory: ${{ env.APP_PATH }}/backend
        run: npm run lint

      - name: Unit tests (Jest)
        working-directory: ${{ env.APP_PATH }}/backend
        run: npx jest --verbose

      - name: Build (esbuild bundle)
        working-directory: ${{ env.APP_PATH }}/backend
        run: npm run build

  frontend:
    name: Frontend — Lint, Test & Build
    needs: schemas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared schemas
        working-directory: ${{ env.APP_PATH }}/packages/schemas
        run: npm run build

      - name: Lint
        working-directory: ${{ env.APP_PATH }}/frontend
        run: npm run lint

      - name: Unit tests (Jest)
        working-directory: ${{ env.APP_PATH }}/frontend
        run: npx jest --verbose

      - name: Build (Next.js export)
        working-directory: ${{ env.APP_PATH }}/frontend
        run: npm run build
