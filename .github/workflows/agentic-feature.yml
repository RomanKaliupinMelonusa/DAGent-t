# =============================================================================
# Agentic Feature Pipeline — Copilot SDK Headless Orchestrator
# =============================================================================
# Runs the full agentic feature pipeline autonomously using the Copilot SDK.
# Triggered manually via workflow_dispatch with a feature slug and workflow type.
#
# Prerequisites:
#   1. Feature spec exists: <app-path>/.dagent/<slug>_SPEC.md
#   2. GitHub Secret: COPILOT_PAT (PAT with copilot scope for SDK auth)
#
# References:
#   - tools/autonomous-factory/src/client/run-feature.ts
# =============================================================================

name: Agentic Feature Pipeline

concurrency:
  group: agentic-pipeline
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      feature-slug:
        description: 'Feature slug (e.g., my-feature)'
        required: true
        type: string
      app-path:
        description: 'App directory relative to repo root (e.g., apps/sample-app)'
        required: true
        type: string
        default: 'apps/sample-app'
      workflow-name:
        description: 'Pipeline workflow name (e.g., full-stack, backend)'
        required: true
        type: string
      base-branch:
        description: 'Base branch for PR target (default: main)'
        required: false
        type: string
        default: 'main'
      spec-content:
        description: 'Feature spec markdown (paste the full content)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  run-pipeline:
    name: Run Agentic Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install orchestrator dependencies
        run: cd tools/autonomous-factory && npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Authenticate Copilot SDK
        run: gh auth login --with-token <<< "${{ secrets.COPILOT_PAT }}"
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}

      - name: Stage spec file
        id: spec
        run: |
          SPEC_PATH="${RUNNER_TEMP}/feature-spec.md"
          cat > "$SPEC_PATH" <<'SPEC_EOF'
          ${{ inputs.spec-content }}
          SPEC_EOF
          echo "path=${SPEC_PATH}" >> "$GITHUB_OUTPUT"

      - name: Run Agentic Pipeline
        run: npm run agent:run -- --app ${{ inputs.app-path }} --workflow ${{ inputs.workflow-name }} --spec-file ${{ steps.spec.outputs.path }} ${{ inputs.feature-slug }}
        env:
          POLL_MAX_RETRIES: "60"
          BASE_BRANCH: ${{ inputs.base-branch }}
          APP_ROOT: ${{ inputs.app-path }}
        timeout-minutes: 120
