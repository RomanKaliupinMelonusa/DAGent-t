name: mock-python-service
version: 1.0.0
description: "A mock Python microservice for testing multi-app support"
tokenBudget: 4500

agents:
  backend-dev:
    instructions: [always]
    promptFile: backend-dev.agent.md
    mcp: []
    skills: []
  backend-unit-test:
    instructions: [always]
    promptFile: backend-unit-test.agent.md
    mcp: []
    skills: []
  push-app:
    instructions: [always]
    promptFile: push-code.agent.md
    mcp: []
    skills: []
  poll-app-ci:
    instructions: [always]
    promptFile: poll-ci.agent.md
    mcp: []
    skills: []
  integration-test:
    instructions: [always]
    promptFile: backend-unit-test.agent.md
    mcp: []
    skills: []
  publish-pr:
    instructions: [always]
    promptFile: publish-pr.agent.md
    mcp: []
    skills: []

config:
  environment:
    BACKEND_URL: "https://mock-python-svc.azurewebsites.net"
  directories:
    backend: src
    frontend: null
    infra: infra
    e2e: null
    packages: null
  testCommands:
    backendUnit: "cd {appRoot} && pytest -v"
    frontendUnit: null
    integration: "cd {appRoot} && pytest tests/integration -v"
  commitScopes:
    backend: ["src/", "infra/", "in-progress/"]
